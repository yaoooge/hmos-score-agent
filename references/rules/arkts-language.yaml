name: 从 TypeScript 到 ArkTS 的适配规则与 ArkTS 编程规范
version: v1.0.0
summary: 基于《从TypeScript到ArkTS的适配规则》与《ArkTS编程规范》融合提炼的内部规则包，按 must / should / forbidden 分类，用于 HarmonyOS NEXT 生成代码评分与审查。
rule_pack_meta:
  pack_id: arkts-language
  source_name: Huawei-ArkTS-TypeScript-Adaptation-Guide-and-Programming-Guide
  source_version: merged-html-and-v1-rules-2026-04-08
must_rules:
  - id: ARKTS-MUST-001
    rule: 类型、枚举、接口和命名空间名称必须唯一，且不得与变量或函数等标识符冲突。
    detector:
      kind: static
      mode: arkts_static
      config:
        check: identifier_name_conflict
        fileExtensions:
          - .ets
    fallback:
      policy: agent_assisted
    decisionCriteria:
      pass:
        - 已确认类型、枚举、接口和命名空间未与其他标识符冲突。
      fail:
        - 存在类型、枚举、接口或命名空间与变量或函数标识符冲突。
      review:
        - 证据不足，无法确认命名唯一性。
    profile:
      scoring: true
      riskCode: LANGUAGE_CONSTRAINT_VIOLATION
      suppressRubricRiskCodes: []
      metricGroups:
        - type_safety
      impact: medium
  - id: ARKTS-MUST-002
    rule: 一个类中只允许存在一个 static 初始化块。
    detector:
      kind: static
      mode: regex
      config:
        fileExtensions:
          - .ets
        patterns:
          - \bstatic\s*\{[\s\S]*\bstatic\s*\{
    fallback:
      policy: agent_assisted
    decisionCriteria:
      pass:
        - 已确认符合规则：一个类中只允许存在一个 static 初始化块。
      fail:
        - 存在违反规则的证据：一个类中只允许存在一个 static 初始化块。
      notApplicable:
        - 本次改动不涉及该规则约束场景。
      review:
        - 证据不足，无法稳定判断该规则。
    profile:
      scoring: true
      riskCode: LANGUAGE_CONSTRAINT_VIOLATION
      suppressRubricRiskCodes: []
      metricGroups:
        - type_safety
      impact: medium
  - id: ARKTS-MUST-003
    rule: 对无法可靠推断元素类型的数组字面量必须补充显式类型。
    detector:
      kind: none
      config: {}
    fallback:
      policy: agent_assisted
    decisionCriteria:
      pass:
        - 已确认符合规则：对无法可靠推断元素类型的数组字面量必须补充显式类型。
      fail:
        - 存在违反规则的证据：对无法可靠推断元素类型的数组字面量必须补充显式类型。
      notApplicable:
        - 本次改动不涉及该规则约束场景。
      review:
        - 证据不足，无法稳定判断该规则。
    profile:
      scoring: true
      riskCode: LANGUAGE_CONSTRAINT_VIOLATION
      suppressRubricRiskCodes: []
      metricGroups:
        - type_safety
      impact: medium
  - id: ARKTS-MUST-004
    rule: implements 只能作用于 interface，extends 必须遵循类继承类、接口继承接口。
    detector:
      kind: static
      mode: arkts_static
      config:
        check: class_interface_heritage
        fileExtensions:
          - .ets
    fallback:
      policy: agent_assisted
    decisionCriteria:
      pass:
        - 已确认符合规则：implements 只能作用于 interface，extends 必须遵循类继承类、接口继承接口。
      fail:
        - 存在违反规则的证据：implements 只能作用于 interface，extends 必须遵循类继承类、接口继承接口。
      notApplicable:
        - 本次改动不涉及该规则约束场景。
      review:
        - 证据不足，无法稳定判断该规则。
    profile:
      scoring: true
      riskCode: LANGUAGE_CONSTRAINT_VIOLATION
      suppressRubricRiskCodes: []
      metricGroups:
        - type_safety
      impact: medium
  - id: ARKTS-MUST-005
    rule: 限制多态运算符语义，一元运算和 instanceof 需满足 ArkTS 类型约束。
    detector:
      kind: none
      config: {}
    fallback:
      policy: agent_assisted
    decisionCriteria:
      pass:
        - 已确认符合规则：限制多态运算符语义，一元运算和 instanceof 需满足 ArkTS 类型约束。
      fail:
        - 存在违反规则的证据：限制多态运算符语义，一元运算和 instanceof 需满足 ArkTS 类型约束。
      notApplicable:
        - 本次改动不涉及该规则约束场景。
      review:
        - 证据不足，无法稳定判断该规则。
    profile:
      scoring: true
      riskCode: LANGUAGE_CONSTRAINT_VIOLATION
      suppressRubricRiskCodes: []
      metricGroups:
        - type_safety
      impact: medium
  - id: ARKTS-MUST-006
    rule: 只允许抛出 Error 或其派生类实例，catch 参数不得标注 any 或 unknown。
    detector:
      kind: static
      mode: regex
      config:
        fileExtensions:
          - .ets
        patterns:
          - >-
            \bthrow\s+(?:["'`]|[0-9[{]|true\b|false\b|null\b|undefined\b)|\bcatch\s*\(\s*[^):]+\s*:\s*(?:any|unknown)\s*\)
    fallback:
      policy: agent_assisted
    decisionCriteria:
      pass:
        - 已确认符合规则：只允许抛出 Error 或其派生类实例，catch 参数不得标注 any 或 unknown。
      fail:
        - 存在违反规则的证据：只允许抛出 Error 或其派生类实例，catch 参数不得标注 any 或 unknown。
      notApplicable:
