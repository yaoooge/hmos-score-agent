    profile:
      scoring: true
      riskCode: LANGUAGE_CONSTRAINT_VIOLATION
      suppressRubricRiskCodes: []
      metricGroups:
        - type_safety
      impact: medium
  - id: ARKTS-MUST-008
    rule: 多个变量定义和赋值语句不允许写在一行。
    detector:
      kind: static
      mode: regex
      config:
        fileExtensions:
          - .ets
        patterns:
          - >-
            \b(?:let|const|var)\s+[A-Za-z_$][\w$]*(?:\s*:[^=,;\n]+)?(?:\s*=\s*[^,();\n]+)?,\s*[A-Za-z_$][\w$]*(?:\s*[:=]|[,;])|(?<![!<>=])=(?![=>])[^;\n]*;[^\n;]*[A-Za-z_$][\w$]*(?:\.[A-Za-z_$][\w$]*|\[[^\]]+\])?\s*(?<![!<>=])=(?![=>])
    fallback:
      policy: agent_assisted
    decisionCriteria:
      pass:
        - 已确认符合规则：多个变量定义和赋值语句不允许写在一行。
      fail:
        - 存在违反规则的证据：多个变量定义和赋值语句不允许写在一行。
      notApplicable:
        - 本次改动不涉及该规则约束场景。
      review:
