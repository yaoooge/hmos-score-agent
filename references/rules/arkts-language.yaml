forbidden_patterns:
  - id: ARKTS-FORBID-001
    rule: 对象属性名必须是合法标识符，禁止依赖数字键或普通字符串键的动态属性访问。
    detector:
      kind: static
      mode: regex
      config:
        fileExtensions:
          - .ets
        patterns:
          - \b[A-Za-z_$][\w$]*\s*\[\s*['"][^'"]+['"]\s*\]
    fallback:
      policy: agent_assisted
    decisionCriteria:
      pass:
