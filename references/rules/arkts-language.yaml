      review:
        - 证据不足，无法稳定判断该规则。
    profile:
      scoring: true
      riskCode: LANGUAGE_CONSTRAINT_VIOLATION
      suppressRubricRiskCodes: []
      metricGroups:
        - type_safety
      impact: medium
  - id: ARKTS-MUST-007
    rule: 展开运算符仅允许用于数组、Array 子类和 TypedArray，且仅在受支持场景中使用。
    detector:
      kind: none
      config: {}
    fallback:
      policy: agent_assisted
    decisionCriteria:
      pass:
        - 已确认符合规则：展开运算符仅允许用于数组、Array 子类和 TypedArray，且仅在受支持场景中使用。
      fail:
        - 存在违反规则的证据：展开运算符仅允许用于数组、Array 子类和 TypedArray，且仅在受支持场景中使用。
      notApplicable:
        - 本次改动不涉及该规则约束场景。
      review:
