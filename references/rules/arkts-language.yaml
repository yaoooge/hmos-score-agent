    profile:
      scoring: true
      riskCode: LANGUAGE_CONSTRAINT_VIOLATION
      suppressRubricRiskCodes: []
      metricGroups:
        - type_safety
      impact: medium
  - id: ARKTS-MUST-009
    rule: 判断 Number.NaN 时必须使用 Number.isNaN()。
    detector:
      kind: static
      mode: regex
      config:
        fileExtensions:
          - .ets
        patterns:
          - '[!=]==?\s*(?:Number\.)?NaN\b|\b(?:Number\.)?NaN\s*[!=]==?'
    fallback:
      policy: agent_assisted
    decisionCriteria:
      pass:
        - 已确认符合规则：判断 Number.NaN 时必须使用 Number.isNaN()。
      fail:
        - 存在违反规则的证据：判断 Number.NaN 时必须使用 Number.isNaN()。
      notApplicable:
