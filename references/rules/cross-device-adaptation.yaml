    priority: P0
  - id: OM-HOVER-MUST-02
    rule: >-
      悬停态布局必须避让折叠屏折痕区域。检查悬停态布局是否对折痕区域进行了避让处理：使用 FolderStack 或 FoldSplitContainer 时组件会自动避让，自定义实现时必须通过
      display.getCurrentFoldCreaseRegion() 获取折痕位置和大小，并据此计算上下半屏组件的位置和尺寸。本规则检查避让机制，不要求静态证明最终视觉覆盖结果。未使用 FolderStack/FoldSplitContainer，且自定义实现未读取折痕区域并参与尺寸或位置计算，即判定失败
    detector:
      kind: static
      mode: case_constraint_precheck
      config:
        targetPatterns:
          - '**/*.ets'
        kit:
          - 'ArkUI: FolderStack / FoldSplitContainer / display'
        targetChecks:
          - target: '**/*.ets'
            astSignals: []
            llmPrompt: 悬停态布局必须避让折叠屏折痕区域。请基于静态证据复核是否满足该约束。
    fallback:
