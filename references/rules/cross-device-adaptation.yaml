      flexShrink(0)。本规则仅适用于 Flex 内同时存在弹性内容区和固定留白/操作区的拉伸布局；单一均分工具栏、普通横排按钮组或没有弹性/固定区域区分的 Flex 不适用。确认适用后，所有子组件使用相同的 flexGrow/flexShrink 值或未设置拉伸/收缩属性即判定失败
