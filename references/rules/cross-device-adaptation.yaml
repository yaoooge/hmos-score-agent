  - id: OM-GRIDROW-MUST-02
    rule: >-
      GridRow columns 必须按断点非递减设置列数。检查 GridRow 组件的 columns 属性是否按断点从小到大非递减设置列数。当 columns 用于响应式列数配置时，应设置为按断点区分的对象（如 {sm:4, md:8, lg:12,
      xl:12}），且 sm/md/lg/xl 的列数序列不得下降，允许相邻断点列数相同。固定 columns:12 不因 columns 固定直接判定失败；此类场景由 GridCol 的 span/offset 等规则继续判断实际布局响应。仅对跨断点复用的同一 GridRow 配置直接判定；若 GridRow 位于 if/switch 等单断点条件分支内，进入 Agent 复核。较大断点列数小于较小断点即判定失败；columns 值来自无法解析的运行时表达式时进入人工复核
    detector:
      kind: static
      mode: arkui_static
      config:
        check: gridrow_columns_non_decreasing
        targetPatterns:
          - '**/*.ets'
        targetChecks:
          - target: '**/*.ets'
            astSignals: []
            llmPrompt: GridRow columns 必须按断点非递减设置列数。静态扫描已覆盖组件和属性，Agent 仅复核中间态证据。
