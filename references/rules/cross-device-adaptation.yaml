  - id: OM-WEB-MUST-02
    rule: >-
      Native 侧断点变化时必须将断点信息同步至 Web 组件。检查使用 Web 组件的页面，当断点发生变化时，是否通过 WebController.runJavaScript() 或 javaScriptProxy
      将当前断点值（sm/md/lg/xl）同步给 Web 侧。本规则仅在 Web 内容依赖 Native 注入断点，或静态可见证据表明 Web 侧没有独立媒体查询/自适应布局时适用。若 Web 资源不可见、无法确认 Web 侧是否已有独立自适应能力，进入人工复核；确认依赖 Native 断点但未同步时判定失败
    detector:
      kind: static
      mode: case_constraint_precheck
      config:
        targetPatterns:
          - '**/*.ets'
        kit:
          - 'ArkUI: Web / runJavaScript'
        targetChecks:
          - target: '**/*.ets'
            astSignals: []
            llmPrompt: Native 侧断点变化时必须将断点信息同步至 Web 组件。请基于静态证据复核是否满足该约束。
    fallback:
      policy: agent_assisted
    decisionCriteria:
      pass:
        - 符合：已确认 Web 内容依赖 Native 断点，且断点变化通过 runJavaScript 或 javaScriptProxy 同步给 Web 侧
      fail:
        - 违反：已确认 Web 内容依赖 Native 断点，但 Native 侧断点变化后未同步给 Web 侧
      notApplicable:
        - 未发现 Web 组件、Web controller、runJavaScript、javaScriptProxy 或本地 Web 资源入口。
        - 可见证据表明 Web 侧已有独立媒体查询或自适应布局，不依赖 Native 注入断点。
      review:
        - Web 资源不可见，或无法确认 Web 侧是否依赖 Native 注入断点。
    profile:
      scoring: true
      riskCode: LANGUAGE_CONSTRAINT_VIOLATION
      suppressRubricRiskCodes: []
      metricGroups:
        - type_safety
      impact: medium
    rule_name: Native 侧断点变化时必须将断点信息同步至 Web 组件
    priority: P0
  - id: OM-WEB-MUST-03
    rule: >-
      Web 组件必须通过 on('windowSizeChange') 驱动断点同步而非 foldStatusChange。检查 Web 组件所在页面的断点监听方式，必须通过
      window.on('windowSizeChange')、mediaquery.matchMediaSync 或 display.on('change') 驱动断点变化后同步给 Web 组件，与 OM-BREAKPOINT-MUST-05 保持一致。使用 foldStatusChange 或设备方向 API 驱动
      Web 组件断点更新即判定失败
    detector:
      kind: static
      mode: arkui_static
      config:
        check: web_breakpoint_sync_source
        targetPatterns:
          - '**/*.ets'
        kit:
          - 'ArkUI: Web / Window'
        targetChecks:
          - target: '**/*.ets'
            astSignals: []
            llmPrompt: Web 组件必须通过 windowSizeChange、mediaquery 或 display.on('change') 驱动断点同步而非 foldStatusChange。请基于静态证据复核是否满足该约束。
    fallback:
      policy: agent_assisted
    decisionCriteria:
      pass:
        - 符合：Web 组件断点同步由 window.on('windowSizeChange')、mediaquery.matchMediaSync 或 display.on('change') 驱动
      fail:
        - 违反：Web 组件断点同步由 foldStatusChange、设备方向 API 或其他非尺寸监听来源驱动
      notApplicable:
        - 本次改动不涉及该规则约束场景。
      review:
        - 静态证据不足，需要人工复核。
    profile:
      scoring: true
      riskCode: LANGUAGE_CONSTRAINT_VIOLATION
      suppressRubricRiskCodes: []
      metricGroups:
        - type_safety
      impact: medium
    rule_name: Web 组件必须通过标准尺寸监听驱动断点同步而非 foldStatusChange
    priority: P0
  - id: OM-WEB-MUST-04
    rule: >-
      Web 侧媒体查询断点范围必须与系统断点一致。检查 Web 组件加载的页面资源中 CSS 媒体查询断点范围，横向断点应与 ArkUI/Native 口径保持一致：sm:[320px,600px)、md:[600px,840px)、lg:[840px,1440px)、xl:[1440px,+∞)。仅当 ETS 中能定位并读取 Web 资源断点证据时进行判定；Web 资源不可见或无法确认媒体查询范围时进入人工复核。可见 Web
      侧媒体查询使用与系统断点不一致的范围（如 sm:[300px,500px)）即判定失败
    detector:
      kind: static
      mode: arkui_static
      config:
        check: web_media_query_breakpoints_standard
        targetPatterns:
          - '**/*.ets'
        kit:
          - 'ArkUI: Web'
        targetChecks:
          - target: '**/*.ets'
            astSignals: []
            llmPrompt: Web 侧媒体查询断点范围必须与系统断点一致。请基于静态证据复核是否满足该约束。
    fallback:
      policy: agent_assisted
    decisionCriteria:
      pass:
        - 符合：可见 Web 资源中的媒体查询断点范围与 sm/md/lg/xl 系统断点一致
      fail:
        - 违反：可见 Web 资源中的媒体查询断点范围与 320/600/840/1440 边界不一致
      notApplicable:
        - Web 组件不加载需要检查的本地页面资源，或 Web 内容不使用媒体查询断点。
      review:
        - Web 资源不可见，或无法从 ETS 静态证据确认媒体查询断点范围。
    profile:
      scoring: true
      riskCode: LANGUAGE_CONSTRAINT_VIOLATION
      suppressRubricRiskCodes: []
      metricGroups:
        - type_safety
      impact: medium
    rule_name: Web 侧媒体查询断点范围必须与系统断点一致
    priority: P0
  - id: OM-WEB-MUST-05
    rule: >-
      Web 侧纵向断点必须使用宽高比（aspect-ratio）而非高宽比。检查 Web 组件加载的页面资源中涉及纵向断点判断的 CSS 媒体查询，必须使用 aspect-ratio（宽高比，如 min-aspect-ratio:
      1/1.2）而非 HarmonyOS 侧的高宽比。仅当 ETS 中能定位并读取 Web 资源中的纵向断点媒体查询时进行判定；Web 资源不可见或无法确认纵向断点表达式时进入人工复核。可见 Web 侧使用 height/width 形式或使用 orientation 区分纵向断点即判定失败
    detector:
      kind: static
      mode: arkui_static
      config:
        check: web_vertical_breakpoint_aspect_ratio
        targetPatterns:
          - '**/*.ets'
        kit:
          - 'ArkUI: Web'
        targetChecks:
          - target: '**/*.ets'
            astSignals: []
            llmPrompt: Web 侧纵向断点必须使用宽高比（aspect-ratio）而非高宽比。请基于静态证据复核是否满足该约束。
    fallback:
      policy: agent_assisted
    decisionCriteria:
      pass:
        - 符合：可见 Web 资源中的纵向断点媒体查询使用 aspect-ratio
      fail:
        - 违反：可见 Web 资源中的纵向断点使用 height/width 形式或 orientation 区分
      notApplicable:
        - Web 组件不加载需要检查的本地页面资源，或 Web 内容不涉及纵向断点媒体查询。
      review:
        - Web 资源不可见，或无法从 ETS 静态证据确认纵向断点表达式。
    profile:
      scoring: true
      riskCode: LANGUAGE_CONSTRAINT_VIOLATION
      suppressRubricRiskCodes: []
      metricGroups:
        - type_safety
      impact: medium
    rule_name: Web 侧纵向断点必须使用宽高比（aspect-ratio）而非高宽比
    priority: P0
should_rules:
  - id: OM-LIST-SHOULD-01
    rule: >-
      List space 建议按断点设置不同间距。仅检查承担重复卡片、商品或内容列表且 lanes 或外层布局存在响应式多列证据的 List。List 组件的 space 属性建议根据当前断点动态设置不同值，避免在多设备多列布局上始终使用固定常量。推荐值：sm 断点单列列表行间距为 8vp，md 断点双列列表列间距为 12vp 且行间距为
      12vp，lg 断点三列列表列间距为 12vp 且行间距为 16vp。无 lanes/多列布局证据的普通单列 List 判定为不涉及；断点分支、横向列表或业务状态影响布局时进入 Agent 复核。space 使用固定值（如 space: 12）且不随断点变化时，记录为不满足建议，不作为 P0 硬失败
    detector:
      kind: static
      mode: arkui_static
      config:
        check: list_space_by_breakpoint
        targetPatterns:
          - '**/*.ets'
        targetChecks:
          - target: '**/*.ets'
            astSignals: []
            llmPrompt: List space 建议按断点设置不同间距。静态扫描已覆盖组件和属性，Agent 仅复核中间态证据。
    fallback:
      policy: agent_assisted
    decisionCriteria:
      pass:
        - 满足建议：List space 按断点设置不同间距，或固定间距有明确业务理由
      fail:
        - 不满足建议：存在响应式多列列表证据时，List space 使用固定值且无响应式间距证据
      notApplicable:
        - 本次改动不涉及该规则约束场景。
      review:
        - 静态证据不足，需要人工复核。
    profile:
      scoring: true
      riskCode: UI_LAYOUT_OR_BREAKPOINT_MISMATCH
      suppressRubricRiskCodes: []
      metricGroups:
        - static_quality
      impact: light
    rule_name: List space 建议按断点设置不同间距
    priority: P1
  - id: OM-LIST-SHOULD-02
    rule: >-
      List 多列时 divider 建议设为 undefined。检查 List 组件在 lanes >= 2 时是否将 .divider() 设为 undefined。未设置 divider 或显式设为 undefined 均视为满足建议；多列 List 显式保留 divider
      可能导致分割线在列间错乱，记录为不满足建议
    detector:
      kind: static
      mode: arkui_static
      config:
        check: list_divider_by_lanes
        targetPatterns:
          - '**/*.ets'
        targetChecks:
          - target: '**/*.ets'
            astSignals: []
            llmPrompt: List 多列时 divider 建议设为 undefined。静态扫描已覆盖组件和属性，Agent 仅复核中间态证据。
    fallback:
      policy: agent_assisted
    decisionCriteria:
      pass:
        - 满足建议：List 多列时未设置 divider，或 divider 显式设为 undefined
      fail:
        - 不满足建议：List 在 lanes >= 2 时显式保留 divider
      notApplicable:
        - 本次改动不涉及该规则约束场景。
      review:
        - 静态证据不足，需要人工复核。
    profile:
      scoring: true
      riskCode: UI_LAYOUT_OR_BREAKPOINT_MISMATCH
      suppressRubricRiskCodes: []
      metricGroups:
        - static_quality
      impact: light
    rule_name: List 多列时 divider 建议设为 undefined
    priority: P1
  - id: OM-WATERFLOW-SHOULD-01
    rule: >-
      WaterFlow 动态切换列数建议使用 SLIDING_WINDOW 模式。动态设置列数时建议采用瀑布流的移动窗口布局模式，即取值为 WaterFlowLayoutMode 枚举说明中的
      SLIDING_WINDOW，从而实现更快速的列数转换。仅当 columnsTemplate 可静态确认按断点或多个模板动态切换列数时直接检查 layoutMode；列数未动态切换时判定为不涉及；列数模板来自三元表达式、helper、状态变量或无法解析常量时进入 Agent 复核；动态切换列数但未使用 SLIDING_WINDOW 模式时，记录为不满足建议
    detector:
      kind: static
      mode: arkui_static
      config:
        check: waterflow_sliding_window_mode
        targetPatterns:
          - '**/*.ets'
        targetChecks:
          - target: '**/*.ets'
            astSignals: []
            llmPrompt: WaterFlow 动态切换列数建议使用 SLIDING_WINDOW 模式。静态扫描已覆盖组件和属性，Agent 仅复核中间态证据。
    fallback:
      policy: agent_assisted
    decisionCriteria:
      pass:
        - 满足建议：WaterFlow 动态切换列数时使用 SLIDING_WINDOW 模式
      fail:
        - 不满足建议：可静态确认 WaterFlow 动态切换列数，但未使用 SLIDING_WINDOW 模式
      notApplicable:
        - WaterFlow 未动态切换列数。
      review:
        - 静态证据不足，需要人工复核。
    profile:
      scoring: true
      riskCode: UI_LAYOUT_OR_BREAKPOINT_MISMATCH
      suppressRubricRiskCodes: []
      metricGroups:
        - static_quality
      impact: light
    rule_name: WaterFlow 动态切换列数建议使用 SLIDING_WINDOW 模式
    priority: P1
  - id: OM-WATERFLOW-SHOULD-02
    rule: >-
      WaterFlow 建议通过 itemConstraintSize 设置子组件约束尺寸。检查图片或卡片类 WaterFlow 是否通过 itemConstraintSize 或等效的子项尺寸约束控制卡片尺寸。本规则适用于 FlowItem 根节点包含 Image、卡片容器或固定比例展示内容的图片/卡片瀑布流。若未设置
      itemConstraintSize，但每个 FlowItem 或其根容器已通过明确的 maxWidth/maxHeight/constraintSize/width/height 控制尺寸，可判定为满足。仅
      padding、文本内容自适应或 aspectRatio 单独存在，不视为等效约束，记录为不满足建议。如果 WaterFlow 不是图片或卡片瀑布流，判定为不涉及；无法确认内容类型时进入人工复核
    detector:
      kind: static
      mode: arkui_static
      config:
        check: waterflow_item_constraint_size
        targetPatterns:
          - '**/*.ets'
        targetChecks:
          - target: '**/*.ets'
            astSignals: []
            llmPrompt: WaterFlow 建议通过 itemConstraintSize 设置子组件约束尺寸。静态扫描已覆盖组件和属性，Agent 仅复核中间态证据。
    fallback:
      policy: agent_assisted
    decisionCriteria:
      pass:
        - 满足建议：图片或卡片类 WaterFlow 使用 itemConstraintSize，或 FlowItem 根容器有明确尺寸约束
      fail:
        - 不满足建议：图片或卡片类 WaterFlow 缺少 itemConstraintSize 或等效尺寸约束
      notApplicable:
        - WaterFlow 不是图片或卡片瀑布流。
      review:
        - 无法确认 WaterFlow 内容是否为图片或卡片瀑布流。
    profile:
      scoring: true
      riskCode: UI_LAYOUT_OR_BREAKPOINT_MISMATCH
      suppressRubricRiskCodes: []
      metricGroups:
        - static_quality
      impact: light
    rule_name: WaterFlow 建议通过 itemConstraintSize 设置子组件约束尺寸
    priority: P1
  - id: OM-NAVIGATION-SHOULD-01
    rule: >-
      Navigation Split 双栏模式建议显式设置 navBarWidth。检查 Navigation 组件在 Split 模式下是否设置了 navBarWidth，以避免导航栏占比不可控。双栏时未设置 navBarWidth
      记录为不满足建议；无法确认是否处于 Split 双栏模式时进入人工复核
    detector:
      kind: static
      mode: arkui_static
      config:
        check: navigation_nav_bar_width_required
        targetPatterns:
          - '**/*.ets'
        targetChecks:
          - target: '**/*.ets'
            astSignals: []
            llmPrompt: Navigation Split 双栏模式建议显式设置 navBarWidth。静态扫描已覆盖组件和属性，Agent 仅复核中间态证据。
    fallback:
      policy: agent_assisted
    decisionCriteria:
      pass:
        - 满足建议：Navigation Split 双栏模式显式设置 navBarWidth
      fail:
        - 不满足建议：Navigation Split 双栏模式未显式设置 navBarWidth
      notApplicable:
        - 本次改动不涉及该规则约束场景。
      review:
        - 无法确认 Navigation 是否处于 Split 双栏模式。
    profile:
      scoring: true
      riskCode: UI_LAYOUT_OR_BREAKPOINT_MISMATCH
      suppressRubricRiskCodes: []
      metricGroups:
        - static_quality
      impact: light
    rule_name: Navigation Split 双栏模式建议显式设置 navBarWidth
    priority: P1
  - id: OM-GRIDROW-SHOULD-01
    rule: >-
      GridRow 建议配置 gutter 属性。仅检查包含多个 GridCol 且这些 GridCol 之间存在栅格间距需求的 GridRow。GridRow 子组件之间的栅格间距应优先通过 gutter
      控制，建议同时包含 gutter.x 和 gutter.y；单个 GridCol、全宽结构容器或无多列间距需求的 GridRow 判定为不涉及。页面容器外边距 padding 不视为替代 gutter 的失败证据；未配置 gutter，或仅使用 GridRow 子项 padding/margin 模拟栅格间距时，记录为不满足建议
    detector:
      kind: static
      mode: arkui_static
      config:
        check: gridrow_gutter_required
        targetPatterns:
          - '**/*.ets'
        targetChecks:
          - target: '**/*.ets'
            astSignals: []
            llmPrompt: GridRow 建议配置 gutter 属性。静态扫描已覆盖组件和属性，Agent 仅复核中间态证据。
    fallback:
      policy: agent_assisted
    decisionCriteria:
      pass:
        - 满足建议：GridRow 显式配置 gutter.x 和 gutter.y，或页面外边距 padding 与 gutter 并存
      fail:
        - 不满足建议：包含多个 GridCol 且存在栅格间距需求的 GridRow 未配置 gutter，或仅使用 GridRow 子项 padding/margin 模拟栅格间距
      notApplicable:
        - 本次改动不涉及该规则约束场景。
      review:
        - 静态证据不足，需要人工复核。
    profile:
      scoring: true
      riskCode: UI_LAYOUT_OR_BREAKPOINT_MISMATCH
      suppressRubricRiskCodes: []
      metricGroups:
        - static_quality
      impact: light
    rule_name: GridRow 建议配置 gutter 属性
    priority: P1
  - id: OM-GRIDCOL-SHOULD-01
    rule: >-
      缩进布局建议使用 GridCol offset 实现居中留白。仅当 GridRow/GridCol 已用于大屏居中布局，或存在断点条件下两侧留白逻辑时适用。检查需要在大屏居中展示的内容区域是否通过 GridCol 的 offset 属性实现两侧留白。使用硬编码 margin/padding 模拟缩进而非栅格 offset
      记录为不满足建议；无法确认是否为大屏居中缩进布局时进入人工复核
    detector:
      kind: static
      mode: arkui_static
      config:
        check: gridcol_offset_required
        targetPatterns:
          - '**/*.ets'
        targetChecks:
          - target: '**/*.ets'
            astSignals: []
            llmPrompt: 缩进布局建议使用 GridCol offset 实现居中留白。静态扫描已覆盖组件和属性，Agent 仅复核中间态证据。
    fallback:
      policy: agent_assisted
    decisionCriteria:
      pass:
        - 满足建议：大屏居中缩进布局通过 GridCol offset 实现两侧留白
      fail:
        - 不满足建议：已确认的大屏居中缩进布局使用硬编码 margin/padding 模拟缩进
      notApplicable:
        - 未发现 GridRow/GridCol 大屏居中缩进布局，或内容区域不需要居中留白。
      review:
        - 无法确认内容区域是否为大屏居中缩进布局。
    profile:
      scoring: true
      riskCode: UI_LAYOUT_OR_BREAKPOINT_MISMATCH
      suppressRubricRiskCodes: []
      metricGroups:
        - static_quality
      impact: light
    rule_name: 缩进布局建议使用 GridCol offset 实现居中留白
    priority: P1
  - id: OM-GRIDROW-SHOULD-02
    rule: >-
      大屏居中布局建议使用栅格系统而非动态 constraintSize 限制宽度。检查需要在大屏（md/lg/xl 断点）居中展示且两侧留白的内容区域，是否通过 constraintSize 的
      maxWidth/width/height 属性根据断点值条件判断来设置不同的尺寸限制，从而实现大屏居中效果。典型反模式包括：constraintSize({ maxWidth: breakpoint ===
      LG ? 840 : undefined })、constraintSize({ maxWidth: BreakpointUtils.getValue(...) })、constraintSize({ width:
      condition ? fixedValue : '100%' }) 等根据断点条件动态切换 constraintSize 值的写法。这种做法本质是硬编码宽度，无法随不同大屏尺寸自适应。应使用 GridRow/GridCol
      栅格布局，通过 columns 控制总列数、span 控制内容占据列数、offset 控制两侧留白来实现居中。constraintSize 的属性值中存在根据断点条件（if/三元表达式/断点工具类取值）动态设置
      width/maxWidth 的记录为不满足建议。如果 constraintSize 的值不依赖断点条件（如固定的 minHeight: '100%' 或固定的 maxWidth 用于限制最大行宽），判定为不涉及
