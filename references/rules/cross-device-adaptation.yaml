  - id: OM-HOVER-MUST-01
    rule: >-
      悬停态页面布局必须将展示类组件置于上半屏、交互类组件置于下半屏。检查悬停态页面的布局结构，展示类组件包括视频画面、图片预览、游戏画面、XComponent、Canvas、Web 等主要展示区域，交互类组件包括播放控制、返回按钮、滑块、输入框、操作手柄、控制栏等。展示类组件必须位于上半屏区域，交互类组件必须位于下半屏区域。能够明确分类的交互类组件出现在上半屏或展示类组件出现在下半屏即判定失败；组件语义无法分类时进入人工复核
