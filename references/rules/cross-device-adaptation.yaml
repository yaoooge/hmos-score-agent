      riskCode: LANGUAGE_CONSTRAINT_VIOLATION
      suppressRubricRiskCodes: []
      metricGroups:
        - type_safety
      impact: medium
    rule_name: 悬停态布局必须避让折叠屏折痕区域
    priority: P0
  - id: OM-HOVER-MUST-03
