name: HarmonyOS 一多适配通用规则包
version: v1.0.0
summary: 基于一多适配通用规则整理的内部条件规则包，仅在任务理解判定涉及一多适配时启用。
rule_pack_meta:
  pack_id: cross-device-adaptation
  source_name: HarmonyOS-Cross-Device-Adaptation-General-Rules
  source_version: general-rules-2026-05-15
must_rules:
  - id: RSP-MUST-01
    rule: >-
      横向断点划分范围必须符合系统推荐值。检查工程中自定义断点系统或 WidthBreakpointType 工具类的断点边界定义，横向断点划分必须为
      xs:(0,320)、sm:[320,600)、md:[600,840)、lg:[840,1440)、xl:[1440,+∞)。若使用 GridRow 的 breakpoints.value，值必须为
      ['320vp','600vp','840vp','1440vp']。断点边界值与系统推荐不一致即判定失败
    detector_kind: case_constraint
    detector_config:
      targetPatterns:
        - '**/*.ets'
      kit:
        - 'ArkUI: GridRow / WidthBreakpoint'
      targetChecks:
        - target: '**/*.ets'
          astSignals: []
          llmPrompt: >-
            检查工程中自定义断点系统或 WidthBreakpointType 工具类的断点边界定义，横向断点划分必须为
            xs:(0,320)、sm:[320,600)、md:[600,840)、lg:[840,1440)、xl:[1440,+∞)。若使用 GridRow 的 breakpoints.value，值必须为
            ['320vp','600vp','840vp','1440vp']。断点边界值与系统推荐不一致即判定失败
      llmPrompt: >-
        检查工程中自定义断点系统或 WidthBreakpointType 工具类的断点边界定义，横向断点划分必须为
        xs:(0,320)、sm:[320,600)、md:[600,840)、lg:[840,1440)、xl:[1440,+∞)。若使用 GridRow 的 breakpoints.value，值必须为
        ['320vp','600vp','840vp','1440vp']。断点边界值与系统推荐不一致即判定失败
    fallback_policy: agent_assisted
  - id: RSP-MUST-02
    rule: >-
      布局条件分支必须使用断点枚举值而非硬编码宽度。检查页面代码中所有布局条件判断（if/else、三元表达式），必须使用 WidthBreakpoint.WIDTH_SM/MD/LG/XL 枚举或 BreakpointType 的
      sm/md/lg/xl 字段，不得使用 if(width > 600) 或 if(vp > 840) 等硬编码数值比较。存在硬编码宽度值做布局判断即判定失败
    detector_kind: case_constraint
    detector_config:
      targetPatterns:
        - '**/*.ets'
      kit:
        - 'ArkUI: WidthBreakpoint'
      targetChecks:
        - target: '**/*.ets'
          astSignals: []
          llmPrompt: >-
            检查页面代码中所有布局条件判断（if/else、三元表达式），必须使用 WidthBreakpoint.WIDTH_SM/MD/LG/XL 枚举或 BreakpointType 的 sm/md/lg/xl
            字段，不得使用 if(width > 600) 或 if(vp > 840) 等硬编码数值比较。存在硬编码宽度值做布局判断即判定失败
      llmPrompt: >-
        检查页面代码中所有布局条件判断（if/else、三元表达式），必须使用 WidthBreakpoint.WIDTH_SM/MD/LG/XL 枚举或 BreakpointType 的 sm/md/lg/xl 字段，不得使用
        if(width > 600) 或 if(vp > 840) 等硬编码数值比较。存在硬编码宽度值做布局判断即判定失败
    fallback_policy: agent_assisted
  - id: RSP-MUST-03
    rule: >-
      WidthBreakpointType 工具类必须覆盖 sm/md/lg/xl 四个断点。检查 WidthBreakpointType 工具类定义，构造函数必须接受 sm、md、lg、xl 四个参数，getValue
      方法必须根据 WidthBreakpoint 枚举正确返回对应值。缺失任一断点参数或 getValue 分支不完整即判定失败
    detector_kind: case_constraint
    detector_config:
      targetPatterns:
        - '**/*.ets'
      kit:
        - 'ArkUI: WidthBreakpoint'
      targetChecks:
        - target: '**/*.ets'
          astSignals: []
          llmPrompt: >-
            检查 WidthBreakpointType 工具类定义，构造函数必须接受 sm、md、lg、xl 四个参数，getValue 方法必须根据 WidthBreakpoint 枚举正确返回对应值。缺失任一断点参数或
            getValue 分支不完整即判定失败
      llmPrompt: >-
        检查 WidthBreakpointType 工具类定义，构造函数必须接受 sm、md、lg、xl 四个参数，getValue 方法必须根据 WidthBreakpoint 枚举正确返回对应值。缺失任一断点参数或
        getValue 分支不完整即判定失败
    fallback_policy: agent_assisted
  - id: RSP-MUST-04
    rule: 页面组件必须通过断点系统获取当前断点值。检查页面中需要根据断点切换布局的组件，是否通过断点工具类获取当前断点值、或 @Env 系统断点变量获取断点值。自行计算窗口宽度除以密度来推导断点即判定失败
    detector_kind: case_constraint
    detector_config:
      targetPatterns:
        - '**/*.ets'
      kit:
        - 'ArkUI: WidthBreakpoint'
      targetChecks:
        - target: '**/*.ets'
          astSignals: []
          llmPrompt: 检查页面中需要根据断点切换布局的组件，是否通过断点工具类获取当前断点值、或 @Env 系统断点变量获取断点值。自行计算窗口宽度除以密度来推导断点即判定失败
      llmPrompt: 检查页面中需要根据断点切换布局的组件，是否通过断点工具类获取当前断点值、或 @Env 系统断点变量获取断点值。自行计算窗口宽度除以密度来推导断点即判定失败
    fallback_policy: agent_assisted
  - id: RSP-MUST-05
    rule: >-
      窗口尺寸监听必须基于 on('windowSizeChange') 或者 mediaquery.matchMediaSync。检查断点更新逻辑是否注册在 window.on('windowSizeChange')
      回调中，或者mediaquery.matchMediaSync中监听断点变化的。使用 foldStatusChange 或设备方向 API 驱动断点更新即判定失败
    detector_kind: case_constraint
    detector_config:
      targetPatterns:
        - '**/*.ets'
      kit:
        - 'ArkUI: Window'
      targetChecks:
        - target: '**/*.ets'
          astSignals: []
          llmPrompt: >-
            检查断点更新逻辑是否注册在 window.on('windowSizeChange') 回调中，或者mediaquery.matchMediaSync中监听断点变化的。使用 foldStatusChange
            或设备方向 API 驱动断点更新即判定失败
      llmPrompt: >-
        检查断点更新逻辑是否注册在 window.on('windowSizeChange') 回调中，或者mediaquery.matchMediaSync中监听断点变化的。使用 foldStatusChange 或设备方向
        API 驱动断点更新即判定失败
    fallback_policy: agent_assisted
  - id: RSP-MUST-06
    rule: 注册断点监听的方法必须在 loadContent 回调后调用。注册断点监听的方法必须在 loadContent 回调后调用
    detector_kind: case_constraint
    detector_config:
      targetPatterns:
        - '**/*.ets'
      targetChecks:
        - target: '**/*.ets'
          astSignals: []
          llmPrompt: 注册断点监听的方法必须在 loadContent 回调后调用
      llmPrompt: 注册断点监听的方法必须在 loadContent 回调后调用
    fallback_policy: agent_assisted
  - id: RSP-MUST-07
    rule: >-
      GridRow 的 breakpoints.value 必须与系统断点一致。检查所有 GridRow 组件的 breakpoints.value 配置，值必须为
      ['320vp','600vp','840vp','1440vp']。自定义栅格断点阈值（如 ['400vp','700vp']）会导致与全局断点系统不同步即判定失败
    detector_kind: case_constraint
    detector_config:
      targetPatterns:
        - '**/*.ets'
      kit:
        - 'ArkUI: GridRow'
      targetChecks:
        - target: '**/*.ets'
          astSignals: []
          llmPrompt: >-
            检查所有 GridRow 组件的 breakpoints.value 配置，值必须为 ['320vp','600vp','840vp','1440vp']。自定义栅格断点阈值（如
            ['400vp','700vp']）会导致与全局断点系统不同步即判定失败
      llmPrompt: >-
        检查所有 GridRow 组件的 breakpoints.value 配置，值必须为 ['320vp','600vp','840vp','1440vp']。自定义栅格断点阈值（如
        ['400vp','700vp']）会导致与全局断点系统不同步即判定失败
    fallback_policy: agent_assisted
  - id: CMP-MUST-01
    rule: >-
      List lanes 必须按断点递增设置列数。检查使用 List 组件展示重复内容的页面，lanes 属性必须根据断点设置对应列数或行数，且必须随断点从小到大递增。所有断点 lanes 值相同、sm
      断点即使用多列、或较大断点列数小于较小断点即判定失败
    detector_kind: case_constraint
    detector_config:
      targetPatterns:
        - '**/*.ets'
      kit:
        - 'ArkUI: List'
      targetChecks:
        - target: '**/*.ets'
          astSignals: []
          llmPrompt: 检查使用 List 组件展示重复内容的页面，lanes 属性必须根据断点设置对应列数或行数，且必须随断点从小到大递增。所有断点 lanes 值相同、sm 断点即使用多列、或较大断点列数小于较小断点即判定失败
      llmPrompt: 检查使用 List 组件展示重复内容的页面，lanes 属性必须根据断点设置对应列数或行数，且必须随断点从小到大递增。所有断点 lanes 值相同、sm 断点即使用多列、或较大断点列数小于较小断点即判定失败
    fallback_policy: agent_assisted
  - id: CMP-MUST-02
    rule: WaterFlow columnsTemplate 必须按断点递增列数。检查 WaterFlow 组件的 columnsTemplate 是否根据断点设置递增列数。所有断点列数相同即判定失败
    detector_kind: case_constraint
    detector_config:
      targetPatterns:
        - '**/*.ets'
      kit:
        - 'ArkUI: WaterFlow'
      targetChecks:
        - target: '**/*.ets'
          astSignals: []
          llmPrompt: 检查 WaterFlow 组件的 columnsTemplate 是否根据断点设置递增列数。所有断点列数相同即判定失败
      llmPrompt: 检查 WaterFlow 组件的 columnsTemplate 是否根据断点设置递增列数。所有断点列数相同即判定失败
    fallback_policy: agent_assisted
  - id: CMP-MUST-03
    rule: Swiper displayCount 必须按断点递增。检查 Swiper 组件的 displayCount 是否根据断点设置递增值。所有断点 displayCount 相同即判定失败
    detector_kind: case_constraint
    detector_config:
      targetPatterns:
        - '**/*.ets'
      kit:
        - 'ArkUI: Swiper'
      targetChecks:
        - target: '**/*.ets'
          astSignals: []
          llmPrompt: 检查 Swiper 组件的 displayCount 是否根据断点设置递增值。所有断点 displayCount 相同即判定失败
      llmPrompt: 检查 Swiper 组件的 displayCount 是否根据断点设置递增值。所有断点 displayCount 相同即判定失败
    fallback_policy: agent_assisted
  - id: CMP-MUST-04
    rule: >-
      Swiper indicator 必须按 displayCount 正确显隐。检查 Swiper 组件的 indicator 属性：displayCount 为 1（单元素展示）时应显示圆点指示器
      Indicator.dot()，displayCount >= 2（多元素展示）时必须设为 false。多元素展示时仍显示圆点指示器会导致指示点位置错乱即判定失败
    detector_kind: case_constraint
    detector_config:
      targetPatterns:
        - '**/*.ets'
      kit:
        - 'ArkUI: Swiper / indicator / displayCount'
      targetChecks:
        - target: '**/*.ets'
          astSignals: []
          llmPrompt: >-
            检查 Swiper 组件的 indicator 属性：displayCount 为 1（单元素展示）时应显示圆点指示器 Indicator.dot()，displayCount >= 2（多元素展示）时必须设为
            false。多元素展示时仍显示圆点指示器会导致指示点位置错乱即判定失败
      llmPrompt: >-
        检查 Swiper 组件的 indicator 属性：displayCount 为 1（单元素展示）时应显示圆点指示器 Indicator.dot()，displayCount >= 2（多元素展示）时必须设为
        false。多元素展示时仍显示圆点指示器会导致指示点位置错乱即判定失败
    fallback_policy: agent_assisted
  - id: CMP-MUST-05
    rule: Grid columnsTemplate 必须按断点递增列数。检查 Grid 组件的 columnsTemplate 是否根据断点设置递增列数。所有断点列数相同即判定失败
    detector_kind: case_constraint
    detector_config:
      targetPatterns:
        - '**/*.ets'
      kit:
        - 'ArkUI: Grid / columnsTemplate'
      targetChecks:
        - target: '**/*.ets'
          astSignals: []
          llmPrompt: 检查 Grid 组件的 columnsTemplate 是否根据断点设置递增列数。所有断点列数相同即判定失败
      llmPrompt: 检查 Grid 组件的 columnsTemplate 是否根据断点设置递增列数。所有断点列数相同即判定失败
    fallback_policy: agent_assisted
  - id: CMP-MUST-06
    rule: >-
      SideBarContainer showSideBar 必须按断点动态控制。检查 SideBarContainer 组件的 showSideBar 属性是否根据断点动态设置：sm 断点默认 false（隐藏侧边栏），md/lg
      断点默认 true（显示侧边栏，充分利用横向空间展示辅助内容）。所有断点 showSideBar 值固定不变即判定失败
    detector_kind: case_constraint
    detector_config:
      targetPatterns:
        - '**/*.ets'
      kit:
        - 'ArkUI: SideBarContainer / showSideBar'
      targetChecks:
        - target: '**/*.ets'
          astSignals: []
          llmPrompt: >-
            检查 SideBarContainer 组件的 showSideBar 属性是否根据断点动态设置：sm 断点默认 false（隐藏侧边栏），md/lg 断点默认
            true（显示侧边栏，充分利用横向空间展示辅助内容）。所有断点 showSideBar 值固定不变即判定失败
      llmPrompt: >-
        检查 SideBarContainer 组件的 showSideBar 属性是否根据断点动态设置：sm 断点默认 false（隐藏侧边栏），md/lg 断点默认 true（显示侧边栏，充分利用横向空间展示辅助内容）。所有断点
        showSideBar 值固定不变即判定失败
    fallback_policy: agent_assisted
  - id: CMP-MUST-07
    rule: >-
      SideBarContainer sideBarWidth 必须按断点设置不同宽度。检查 SideBarContainer 组件的 sideBarWidth 是否根据断点设置不同值。所有断点 sideBarWidth
      值相同即判定失败
    detector_kind: case_constraint
    detector_config:
      targetPatterns:
        - '**/*.ets'
      kit:
        - 'ArkUI: SideBarContainer / sideBarWidth'
      targetChecks:
        - target: '**/*.ets'
          astSignals: []
          llmPrompt: 检查 SideBarContainer 组件的 sideBarWidth 是否根据断点设置不同值。所有断点 sideBarWidth 值相同即判定失败
      llmPrompt: 检查 SideBarContainer 组件的 sideBarWidth 是否根据断点设置不同值。所有断点 sideBarWidth 值相同即判定失败
    fallback_policy: agent_assisted
  - id: CMP-MUST-08
    rule: >-
      SideBarContainer 类型必须按断点区分 Overlay 和 Embed。检查 SideBarContainer 组件的构造参数是否根据断点区分：sm 使用
      SideBarContainerType.Overlay（浮层模式，侧边栏浮在内容区上），md/lg 使用 SideBarContainerType.Embed（嵌入模式，侧边栏和内容区并列展示）。所有断点使用相同类型即判定失败
    detector_kind: case_constraint
    detector_config:
      targetPatterns:
        - '**/*.ets'
      kit:
        - 'ArkUI: SideBarContainer / SideBarContainerType'
      targetChecks:
        - target: '**/*.ets'
          astSignals: []
          llmPrompt: >-
            检查 SideBarContainer 组件的构造参数是否根据断点区分：sm 使用 SideBarContainerType.Overlay（浮层模式，侧边栏浮在内容区上），md/lg 使用
            SideBarContainerType.Embed（嵌入模式，侧边栏和内容区并列展示）。所有断点使用相同类型即判定失败
      llmPrompt: >-
        检查 SideBarContainer 组件的构造参数是否根据断点区分：sm 使用 SideBarContainerType.Overlay（浮层模式，侧边栏浮在内容区上），md/lg 使用
        SideBarContainerType.Embed（嵌入模式，侧边栏和内容区并列展示）。所有断点使用相同类型即判定失败
    fallback_policy: agent_assisted
  - id: CMP-SHOULD-16
    rule: >-
      涉及Navigation分栏的时候， mode 必须按断点切换 Stack 和 Split。Navigation设计分栏的时候，检查 Navigation 组件的 mode 属性是否根据断点动态设置：sm 断点使用
      NavigationMode.Stack（单栏），md/lg 断点使用 NavigationMode.Split（双栏）。所有断点使用相同 mode 即判定失败
    detector_kind: case_constraint
    detector_config:
      targetPatterns:
        - '**/*.ets'
      kit:
        - 'ArkUI: Navigation / NavigationMode'
      targetChecks:
        - target: '**/*.ets'
          astSignals: []
          llmPrompt: >-
            Navigation设计分栏的时候，检查 Navigation 组件的 mode 属性是否根据断点动态设置：sm 断点使用 NavigationMode.Stack（单栏），md/lg 断点使用
            NavigationMode.Split（双栏）。所有断点使用相同 mode 即判定失败
      llmPrompt: >-
        Navigation设计分栏的时候，检查 Navigation 组件的 mode 属性是否根据断点动态设置：sm 断点使用 NavigationMode.Stack（单栏），md/lg 断点使用
        NavigationMode.Split（双栏）。所有断点使用相同 mode 即判定失败
    fallback_policy: agent_assisted
  - id: CMP-MUST-10
    rule: >-
      Tabs vertical 必须按断点切换横向和纵向。检查主导航 Tabs 组件的 vertical 属性是否根据断点动态设置：sm/md 断点 vertical 为 false（底部横向导航），lg 断点 vertical 为
      true（侧边纵向导航）。所有断点 vertical 值相同即判定失败
    detector_kind: case_constraint
    detector_config:
      targetPatterns:
        - '**/*.ets'
      kit:
        - 'ArkUI: Tabs'
      targetChecks:
        - target: '**/*.ets'
          astSignals: []
          llmPrompt: >-
            检查主导航 Tabs 组件的 vertical 属性是否根据断点动态设置：sm/md 断点 vertical 为 false（底部横向导航），lg 断点 vertical 为 true（侧边纵向导航）。所有断点
            vertical 值相同即判定失败
      llmPrompt: >-
        检查主导航 Tabs 组件的 vertical 属性是否根据断点动态设置：sm/md 断点 vertical 为 false（底部横向导航），lg 断点 vertical 为 true（侧边纵向导航）。所有断点
        vertical 值相同即判定失败
    fallback_policy: agent_assisted
  - id: CMP-MUST-11
    rule: >-
      Tabs barPosition 必须按断点切换 End 和 Start。检查 Tabs 组件的 barPosition 属性是否根据断点动态设置：sm/md 断点为 BarPosition.End（底部），lg 断点为
      BarPosition.Start（左侧）。barPosition 与 vertical 不匹配（如 vertical:true 但 barPosition:End）即判定失败
    detector_kind: case_constraint
    detector_config:
      targetPatterns:
        - '**/*.ets'
      kit:
        - 'ArkUI: Tabs'
      targetChecks:
        - target: '**/*.ets'
          astSignals: []
          llmPrompt: >-
            检查 Tabs 组件的 barPosition 属性是否根据断点动态设置：sm/md 断点为 BarPosition.End（底部），lg 断点为 BarPosition.Start（左侧）。barPosition
            与 vertical 不匹配（如 vertical:true 但 barPosition:End）即判定失败
      llmPrompt: >-
        检查 Tabs 组件的 barPosition 属性是否根据断点动态设置：sm/md 断点为 BarPosition.End（底部），lg 断点为 BarPosition.Start（左侧）。barPosition 与
        vertical 不匹配（如 vertical:true 但 barPosition:End）即判定失败
    fallback_policy: agent_assisted
  - id: CMP-MUST-12
    rule: Tabs barWidth 和 barHeight 必须按断点设置。检查 Tabs 组件的 barWidth 和 barHeight 是否根据断点动态设置。barWidth/barHeight 在所有断点保持固定值即判定失败
    detector_kind: case_constraint
    detector_config:
      targetPatterns:
