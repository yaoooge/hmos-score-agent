      notApplicable:
        - 未使用 FolderStack、FoldSplitContainer、半折 posture 或折痕区域 API，且没有自定义悬停态布局证据。
      review:
        - 组件语义无法明确归类为展示类或交互类，需要人工复核。
    profile:
      scoring: true
      riskCode: LANGUAGE_CONSTRAINT_VIOLATION
      suppressRubricRiskCodes: []
      metricGroups:
        - type_safety
      impact: medium
