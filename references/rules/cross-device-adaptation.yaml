      policy: agent_assisted
    decisionCriteria:
      pass:
        - 符合：GridRow columns 按断点配置且序列非递减，或使用固定 columns:12 且不以 columns 作为响应式列数手段
      fail:
        - 违反：GridRow columns 已按断点配置，但较大断点列数小于较小断点
      notApplicable:
        - GridRow 使用固定 columns，实际布局响应由 GridCol span/offset 等规则判断。
      review:
        - columns 值来自无法解析的运行时表达式，需要人工复核。
        - GridRow 位于断点条件分支内，需结合实际渲染分支判断该 columns 配置是否跨断点复用。
    profile:
      scoring: true
      riskCode: UI_LAYOUT_OR_BREAKPOINT_MISMATCH
      suppressRubricRiskCodes: []
      metricGroups:
        - type_safety
      impact: medium
    rule_name: GridRow columns 必须按断点非递减设置列数
    priority: P0
  - id: OM-GRIDCOL-MUST-01
    rule: >-
      GridCol 实际布局占比应按断点体现响应式差异。检查需要响应式适配的 GridCol 组件，sm/md/lg 断点下的实际布局占比应随断点变化，以实现挪移或缩进等响应式布局效果。判定条件：如果 GridCol 所在
      GridRow 的 columns 按断点变化（即 GridRow 本身是响应式的），则 GridCol 的 span 或 span/columns 比值应在断点间体现差异；如果 GridCol
      在所有断点都占据全部列数（如全宽横幅），或 GridRow 的 columns 在所有断点都相同，则判定为不涉及。满足以下任一条件即视为合规：1. span 值在不同断点间不同；2. span 值相同但 GridRow 的
      columns 不同（此时 span/columns 实际占比不同，如 md 断点 span=8/columns=8 占满全宽，lg 断点 span=8/columns=12 留白居中，效果不同）。仅在 GridRow
      columns 按断点变化、且 GridCol 的 span 值在所有断点完全相同且 span/columns 占比也完全相同时，才判定失败
    detector:
      kind: static
      mode: arkui_static
      config:
        check: gridcol_span_by_breakpoint
        targetPatterns:
          - '**/*.ets'
        targetChecks:
          - target: '**/*.ets'
            astSignals: []
            llmPrompt: GridCol 实际布局占比应按断点体现响应式差异。静态扫描已覆盖组件和属性，Agent 仅复核中间态证据。
    fallback:
      policy: agent_assisted
    decisionCriteria:
      pass:
        - 符合：GridCol 的 span 值或 span/columns 实际占比在断点间体现响应式差异
      fail:
