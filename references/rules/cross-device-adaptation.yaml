      riskCode: UI_LAYOUT_OR_BREAKPOINT_MISMATCH
      suppressRubricRiskCodes: []
      metricGroups:
        - static_quality
      impact: light
    rule_name: 大屏居中布局建议使用栅格系统而非动态 constraintSize 限制宽度
    priority: P1
