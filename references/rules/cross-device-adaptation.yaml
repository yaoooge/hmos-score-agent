          llmPrompt: 若要动态设置列数，建议采用瀑布流的移动窗口布局模式，即取值为 WaterFlowLayoutMode 枚举说明中的 SLIDING_WINDOW，从而实现更快速的列数转换
      llmPrompt: 若要动态设置列数，建议采用瀑布流的移动窗口布局模式，即取值为 WaterFlowLayoutMode 枚举说明中的 SLIDING_WINDOW，从而实现更快速的列数转换
