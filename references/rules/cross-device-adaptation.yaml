        - 满足建议：可见 Web 资源中的 Grid 宫格列数按断点非递减，或使用 auto-fit/auto-fill 自适应列数
      fail:
        - 不满足建议：可见 Web 资源中的 Grid 宫格列数在所有断点相同，且未使用自适应列数
      notApplicable:
        - Web 组件不加载需要检查的本地页面资源，或 Web 内容不使用 CSS Grid 宫格布局。
      review:
        - Web 资源不可见，或无法确认 Web 侧是否存在宫格布局。
    profile:
      scoring: true
      riskCode: LANGUAGE_CONSTRAINT_VIOLATION
      suppressRubricRiskCodes: []
      metricGroups:
        - static_quality
      impact: light
    rule_name: Web 侧宫格布局列数建议按断点非递减或使用自适应列数
    priority: P1
  - id: OM-WEB-SHOULD-03
    rule: >-
      Web 侧轮播布局 displayCount 建议按断点非递减且按条件显隐指示器。仅当 ETS 中能定位并读取 Web 组件加载的页面资源，且能识别可见的 Web 轮播实现时检查：sm 断点建议显示单张轮播元素并展示圆点指示器，md/lg
      断点建议同时显示多张轮播元素（displayCount >= 2）并隐藏圆点指示器。可见 Web 轮播在所有断点轮播元素显示数量相同或指示器显隐策略不随 displayCount 变化时，记录为不满足建议；无法识别轮播库或 Web 资源不可见时进入人工复核
    detector:
      kind: static
      mode: case_constraint_precheck
      config:
        targetPatterns:
          - '**/*.ets'
        kit:
          - 'ArkUI: Web'
        targetChecks:
          - target: '**/*.ets'
            astSignals: []
            llmPrompt: Web 侧轮播布局 displayCount 建议按断点非递减且按条件显隐指示器。请基于静态证据复核是否满足该约束。
    fallback:
      policy: agent_assisted
    decisionCriteria:
      pass:
        - 满足建议：可见 Web 轮播 displayCount 按断点非递减，且指示器随 displayCount 条件显隐
      fail:
        - 不满足建议：可见 Web 轮播在所有断点显示数量相同，或指示器显隐策略不随 displayCount 变化
      notApplicable:
        - Web 组件不加载需要检查的本地页面资源，或 Web 内容不包含可识别的轮播布局。
      review:
        - Web 资源不可见，或无法识别 Web 侧轮播库/轮播实现。
    profile:
      scoring: true
      riskCode: LANGUAGE_CONSTRAINT_VIOLATION
      suppressRubricRiskCodes: []
      metricGroups:
        - static_quality
      impact: light
    rule_name: Web 侧轮播布局 displayCount 建议按断点非递减且按条件显隐指示器
    priority: P1
