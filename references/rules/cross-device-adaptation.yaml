        kit:
          - 'ArkUI: GridRow / GridCol'
        targetChecks:
          - target: '**/*.ets'
            astSignals: []
            llmPrompt: 大屏居中布局建议使用栅格系统而非动态 constraintSize 限制宽度。请基于静态证据复核是否满足该约束。
    fallback:
      policy: agent_assisted
    decisionCriteria:
      pass:
