        kit:
          - 'ArkUI: FolderStack / FoldSplitContainer / display'
        targetChecks:
          - target: '**/*.ets'
            astSignals: []
            llmPrompt: 悬停态页面布局必须将展示类组件置于上半屏、交互类组件置于下半屏。请基于静态证据复核是否满足该约束。
    fallback:
