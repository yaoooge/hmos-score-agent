name: HarmonyOS 一多适配通用规则
version: v1.0.0
summary: 基于一多适配通用规则整理的内部条件规则包，仅在任务理解判定涉及一多适配时启用。
rule_pack_meta:
  pack_id: cross-device-adaptation
  source_name: HarmonyOS-Cross-Device-Adaptation-General-Rules
  source_version: general-rules-2026-05-20
must_rules:
  - id: CFG-MUST-01
    rule: >-
      module.json5 的 deviceTypes 必须包含多设备类型。检查所有 HAR 包或 HAP 模块下的 module.json5 文件中的 deviceTypes
      字段，该字段的枚举值必须至少包含 phone 和 tablet，建议同时包含 phone、tablet、2in1。deviceTypes 中缺少 phone 或 tablet 即判定失败
    detector_kind: case_constraint
    detector_config:
      targetPatterns:
        - '**/module.json5'
      kit:
        - 'HarmonyOS: module.json5'
      targetChecks:
        - target: '**/module.json5'
          astSignals: []
          llmPrompt: >-
            检查所有 HAR 包或 HAP 模块下的 module.json5 文件中的 deviceTypes 字段，该字段的枚举值必须至少包含 phone 和
            tablet，建议同时包含 phone、tablet、2in1。deviceTypes 中缺少 phone 或 tablet 即判定失败
      llmPrompt: >-
        检查所有 HAR 包或 HAP 模块下的 module.json5 文件中的 deviceTypes 字段，该字段的枚举值必须至少包含 phone 和
        tablet，建议同时包含 phone、tablet、2in1。deviceTypes 中缺少 phone 或 tablet 即判定失败
    fallback_policy: agent_assisted
  - id: RSP-MUST-01
    rule: >-
      横向断点划分范围必须符合系统推荐值。检查工程中自定义断点系统或 WidthBreakpointType 工具类的断点边界定义，横向断点划分必须为
      xs:(0,320)、sm:[320,600)、md:[600,840)、lg:[840,1440)、xl:[1440,+∞)。若使用 GridRow 的 breakpoints.value，值必须为
      ['320vp','600vp','840vp','1440vp']。断点边界值与系统推荐不一致即判定失败
    detector_kind: case_constraint
    detector_config:
      targetPatterns:
        - '**/*.ets'
      kit:
        - 'ArkUI: GridRow / WidthBreakpoint'
      targetChecks:
        - target: '**/*.ets'
          astSignals: []
          llmPrompt: >-
            检查工程中自定义断点系统或 WidthBreakpointType 工具类的断点边界定义，横向断点划分必须为
            xs:(0,320)、sm:[320,600)、md:[600,840)、lg:[840,1440)、xl:[1440,+∞)。若使用 GridRow 的 breakpoints.value，值必须为
            ['320vp','600vp','840vp','1440vp']。断点边界值与系统推荐不一致即判定失败
      llmPrompt: >-
        检查工程中自定义断点系统或 WidthBreakpointType 工具类的断点边界定义，横向断点划分必须为
        xs:(0,320)、sm:[320,600)、md:[600,840)、lg:[840,1440)、xl:[1440,+∞)。若使用 GridRow 的 breakpoints.value，值必须为
        ['320vp','600vp','840vp','1440vp']。断点边界值与系统推荐不一致即判定失败
    fallback_policy: agent_assisted
  - id: RSP-MUST-02
    rule: >-
      布局条件分支必须使用断点枚举值而非硬编码宽度。检查所有参与断点计算、断点派发、布局条件判断的代码，包括页面组件、组件、模型、工具类和常量类。不得使用硬编码宽度数值进行断点判断，例如 width < 600、width <
      840、vp > 840、screenWidth >= 600。即使硬编码判断位于 BreakpointUtils、WindowModel、constants 等封装层，只要其结果用于布局断点，也判定失败。布局条件必须基于
      WidthBreakpoint 枚举、GridRow 标准 breakpoints、mediaquery 查询结果，或已覆盖 sm/md/lg/xl 的断点枚举值。排除范围：断点系统自身的注册与初始化方法（如
      BreakpointSystem.register）中使用宽度阈值设定初始断点值属于基础设施内部实现，不属于本规则检查范围
    detector_kind: case_constraint
    detector_config:
      targetPatterns:
        - '**/*.ets'
      kit:
        - 'ArkUI: WidthBreakpoint'
      targetChecks:
        - target: '**/*.ets'
          astSignals: []
          llmPrompt: >-
            检查所有参与断点计算、断点派发、布局条件判断的代码，包括页面组件、组件、模型、工具类和常量类。不得使用硬编码宽度数值进行断点判断，例如 width < 600、width < 840、vp >
            840、screenWidth >= 600。即使硬编码判断位于 BreakpointUtils、WindowModel、constants 等封装层，只要其结果用于布局断点，也判定失败。布局条件必须基于
            WidthBreakpoint 枚举、GridRow 标准 breakpoints、mediaquery 查询结果，或已覆盖 sm/md/lg/xl 的断点枚举值。排除范围：断点系统自身的注册与初始化方法（如
            BreakpointSystem.register）中使用宽度阈值设定初始断点值属于基础设施内部实现，不属于本规则检查范围
      llmPrompt: >-
        检查所有参与断点计算、断点派发、布局条件判断的代码，包括页面组件、组件、模型、工具类和常量类。不得使用硬编码宽度数值进行断点判断，例如 width < 600、width < 840、vp > 840、screenWidth
        >= 600。即使硬编码判断位于 BreakpointUtils、WindowModel、constants 等封装层，只要其结果用于布局断点，也判定失败。布局条件必须基于 WidthBreakpoint
        枚举、GridRow 标准 breakpoints、mediaquery 查询结果，或已覆盖 sm/md/lg/xl 的断点枚举值。排除范围：断点系统自身的注册与初始化方法（如
        BreakpointSystem.register）中使用宽度阈值设定初始断点值属于基础设施内部实现，不属于本规则检查范围
    fallback_policy: agent_assisted
  - id: RSP-MUST-03
    rule: >-
      断点值分发工具类必须覆盖 sm/md/lg/xl 四个断点。检查所有充当断点值分发功能的工具类定义，包括但不限于系统 WidthBreakpointType 和工程自定义的断点值容器类（如
      BreakpointType、BreakpointValue、ResponsiveValue 等命名模式）。识别标准：该类/接口的构造函数或工厂方法接受多个值参数，并提供方法根据断点枚举（WidthBreakpoint
      或自定义断点枚举）返回对应值。无论工具类命名如何，只要功能是按断点分发值，就必须覆盖 sm、md、lg、xl 四个断点。缺失任一断点参数或值分发分支不完整即判定失败。如果工程未使用任何断点值分发工具类（直接在组件内通过
      if/switch 处理断点），判定为不涉及
    detector_kind: case_constraint
    detector_config:
      targetPatterns:
        - '**/*.ets'
      kit:
        - 'ArkUI: WidthBreakpoint'
      targetChecks:
        - target: '**/*.ets'
          astSignals: []
          llmPrompt: >-
            检查所有充当断点值分发功能的工具类定义，包括但不限于系统 WidthBreakpointType 和工程自定义的断点值容器类（如
            BreakpointType、BreakpointValue、ResponsiveValue
            等命名模式）。识别标准：该类/接口的构造函数或工厂方法接受多个值参数，并提供方法根据断点枚举（WidthBreakpoint 或自定义断点枚举）返回对应值。无论工具类命名如何，只要功能是按断点分发值，就必须覆盖
            sm、md、lg、xl 四个断点。缺失任一断点参数或值分发分支不完整即判定失败。如果工程未使用任何断点值分发工具类（直接在组件内通过 if/switch 处理断点），判定为不涉及
      llmPrompt: >-
        检查所有充当断点值分发功能的工具类定义，包括但不限于系统 WidthBreakpointType 和工程自定义的断点值容器类（如 BreakpointType、BreakpointValue、ResponsiveValue
        等命名模式）。识别标准：该类/接口的构造函数或工厂方法接受多个值参数，并提供方法根据断点枚举（WidthBreakpoint 或自定义断点枚举）返回对应值。无论工具类命名如何，只要功能是按断点分发值，就必须覆盖
        sm、md、lg、xl 四个断点。缺失任一断点参数或值分发分支不完整即判定失败。如果工程未使用任何断点值分发工具类（直接在组件内通过 if/switch 处理断点），判定为不涉及
    fallback_policy: agent_assisted
  - id: RSP-MUST-04
    rule: >-
      页面组件必须通过断点系统获取当前断点值。检查页面组件获取当前断点值的来源。允许的来源：1. ArkUI/系统提供的 WidthBreakpoint、GridRow breakpoints、@Env 系统断点变量；2.
      mediaquery.matchMediaSync 或 window.on('windowSizeChange') 驱动的断点状态；3. 项目封装的断点工具，但该工具底层必须来自上述系统断点或标准监听机制。不允许的来源：1.
      组件 onAreaChange 回调直接读取 width 后自行计算断点；2. 自定义 calcBreakpoint(width) 使用 600、840 等宽度阈值推导断点；3. 页面或工具类自行用窗口宽度、组件宽度、px/vp
      换算结果推导断点。命中任一不允许来源即判定失败
    detector_kind: case_constraint
    detector_config:
      targetPatterns:
        - '**/*.ets'
      kit:
        - 'ArkUI: WidthBreakpoint'
      targetChecks:
        - target: '**/*.ets'
          astSignals: []
          llmPrompt: >-
            检查页面组件获取当前断点值的来源。允许的来源：1. ArkUI/系统提供的 WidthBreakpoint、GridRow breakpoints、@Env 系统断点变量；2.
            mediaquery.matchMediaSync 或 window.on('windowSizeChange') 驱动的断点状态；3.
            项目封装的断点工具，但该工具底层必须来自上述系统断点或标准监听机制。不允许的来源：1. 组件 onAreaChange 回调直接读取 width 后自行计算断点；2. 自定义
            calcBreakpoint(width) 使用 600、840 等宽度阈值推导断点；3. 页面或工具类自行用窗口宽度、组件宽度、px/vp 换算结果推导断点。命中任一不允许来源即判定失败
      llmPrompt: >-
        检查页面组件获取当前断点值的来源。允许的来源：1. ArkUI/系统提供的 WidthBreakpoint、GridRow breakpoints、@Env 系统断点变量；2.
        mediaquery.matchMediaSync 或 window.on('windowSizeChange') 驱动的断点状态；3. 项目封装的断点工具，但该工具底层必须来自上述系统断点或标准监听机制。不允许的来源：1.
        组件 onAreaChange 回调直接读取 width 后自行计算断点；2. 自定义 calcBreakpoint(width) 使用 600、840 等宽度阈值推导断点；3.
        页面或工具类自行用窗口宽度、组件宽度、px/vp 换算结果推导断点。命中任一不允许来源即判定失败
    fallback_policy: agent_assisted
  - id: RSP-MUST-05
    rule: >-
      窗口尺寸监听必须基于 on('windowSizeChange')、mediaquery.matchMediaSync 或 display.on('change')。检查断点更新逻辑是否通过
      window.on('windowSizeChange') 回调、mediaquery.matchMediaSync 或 display.on('change') 监听断点变化。display.on('change') 可在 callback
      中通过 Display 实例获取屏幕的宽度、高度和方向等信息，从而感知屏幕尺寸变化。使用 foldStatusChange 或设备方向 API 驱动断点更新即判定失败
    detector_kind: case_constraint
    detector_config:
      targetPatterns:
        - '**/*.ets'
      kit:
        - 'ArkUI: Window / display'
      targetChecks:
        - target: '**/*.ets'
          astSignals: []
          llmPrompt: >-
            检查断点更新逻辑是否通过 window.on('windowSizeChange') 回调、mediaquery.matchMediaSync 或 display.on('change')
            监听断点变化。display.on('change') 可在 callback 中通过 Display
            实例获取屏幕的宽度、高度和方向等信息，从而感知屏幕尺寸变化。使用 foldStatusChange 或设备方向 API 驱动断点更新即判定失败
      llmPrompt: >-
        检查断点更新逻辑是否通过 window.on('windowSizeChange') 回调、mediaquery.matchMediaSync 或 display.on('change') 监听断点变化。display.on('change')
        可在 callback 中通过 Display 实例获取屏幕的宽度、高度和方向等信息，从而感知屏幕尺寸变化。使用 foldStatusChange 或设备方向 API 驱动断点更新即判定失败
    fallback_policy: agent_assisted
  - id: RSP-MUST-06
    rule: >-
      断点监听注册必须在内容加载完成后调用。本规则检查断点监听注册的时序是否安全。如果工程没有使用 window.on('windowSizeChange') 或 mediaquery.matchMediaSync
      注册断点监听，本规则判定为不涉及；监听方式是否合规由 RSP-MUST-05 判定。合理的注册时机包括以下任一情况：1. 在 EntryAbility 的 windowStage.loadContent 成功回调内注册；2. 在
      loadContent 所加载的入口页面组件的 aboutToAppear 生命周期中注册（aboutToAppear 在 loadContent 加载内容、组件树构建之后触发，属于安全时机）；3. 在由入口页面导航到的子页面的
      aboutToAppear 中注册。不合理的注册时机：1. 在 EntryAbility 的 onCreate 或 onWindowStageCreate 中直接注册（此时 loadContent 尚未完成）；2.
      在模块级/文件级顶层语句中注册。组件 onAreaChange 的注册时序不作为本规则检查对象，但其作为断点来源的合规性由 RSP-MUST-04 判定
    detector_kind: case_constraint
    detector_config:
      targetPatterns:
        - '**/*.ets'
      targetChecks:
        - target: '**/*.ets'
          astSignals: []
          llmPrompt: >-
            本规则检查断点监听注册的时序是否安全。如果工程没有使用 window.on('windowSizeChange') 或 mediaquery.matchMediaSync
            注册断点监听，本规则判定为不涉及；监听方式是否合规由 RSP-MUST-05 判定。合理的注册时机包括以下任一情况：1. 在 EntryAbility 的 windowStage.loadContent
            成功回调内注册；2. 在 loadContent 所加载的入口页面组件的 aboutToAppear 生命周期中注册（aboutToAppear 在 loadContent
            加载内容、组件树构建之后触发，属于安全时机）；3. 在由入口页面导航到的子页面的 aboutToAppear 中注册。不合理的注册时机：1. 在 EntryAbility 的 onCreate 或
            onWindowStageCreate 中直接注册（此时 loadContent 尚未完成）；2. 在模块级/文件级顶层语句中注册。组件 onAreaChange
            的注册时序不作为本规则检查对象，但其作为断点来源的合规性由 RSP-MUST-04 判定
      llmPrompt: >-
        本规则检查断点监听注册的时序是否安全。如果工程没有使用 window.on('windowSizeChange') 或 mediaquery.matchMediaSync 注册断点监听，本规则判定为不涉及；监听方式是否合规由
        RSP-MUST-05 判定。合理的注册时机包括以下任一情况：1. 在 EntryAbility 的 windowStage.loadContent 成功回调内注册；2. 在 loadContent 所加载的入口页面组件的
        aboutToAppear 生命周期中注册（aboutToAppear 在 loadContent 加载内容、组件树构建之后触发，属于安全时机）；3. 在由入口页面导航到的子页面的 aboutToAppear
        中注册。不合理的注册时机：1. 在 EntryAbility 的 onCreate 或 onWindowStageCreate 中直接注册（此时 loadContent 尚未完成）；2. 在模块级/文件级顶层语句中注册。组件
        onAreaChange 的注册时序不作为本规则检查对象，但其作为断点来源的合规性由 RSP-MUST-04 判定
    fallback_policy: agent_assisted
  - id: RSP-MUST-07
    rule: >-
      GridRow 的 breakpoints.value 必须与系统断点一致。检查所有 GridRow 组件的 breakpoints.value 配置，值必须为
      ['320vp','600vp','840vp','1440vp']。自定义栅格断点阈值（如 ['400vp','700vp']）会导致与全局断点系统不同步即判定失败
    detector_kind: case_constraint
    detector_config:
      targetPatterns:
        - '**/*.ets'
      kit:
        - 'ArkUI: GridRow'
      targetChecks:
        - target: '**/*.ets'
          astSignals: []
          llmPrompt: >-
            检查所有 GridRow 组件的 breakpoints.value 配置，值必须为 ['320vp','600vp','840vp','1440vp']。自定义栅格断点阈值（如
            ['400vp','700vp']）会导致与全局断点系统不同步即判定失败
      llmPrompt: >-
        检查所有 GridRow 组件的 breakpoints.value 配置，值必须为 ['320vp','600vp','840vp','1440vp']。自定义栅格断点阈值（如
        ['400vp','700vp']）会导致与全局断点系统不同步即判定失败
    fallback_policy: agent_assisted
  - id: CMP-MUST-01
    rule: >-
      List lanes 必须按断点非递减设置列数。检查使用 List 组件展示重复内容的页面，lanes 属性必须按断点从小到大非递减设置列数。对同一个 List，sm/md/lg/xl
      的列数序列不得下降，允许相邻断点列数相同。例如 1/2/3 满足，2/2/3 满足，1/2/2 满足，2/2/2 满足，4/4/3 不满足，4/3/3
      不满足。较大断点列数小于较小断点即判定失败
    detector_kind: case_constraint
    detector_config:
      targetPatterns:
        - '**/*.ets'
      kit:
        - 'ArkUI: List'
      targetChecks:
        - target: '**/*.ets'
          astSignals: []
          llmPrompt: >-
            检查使用 List 组件展示重复内容的页面，lanes 属性必须按断点从小到大非递减设置列数。对同一个 List，sm/md/lg/xl
            的列数序列不得下降，允许相邻断点列数相同。例如 1/2/3 满足，2/2/3 满足，1/2/2 满足，2/2/2 满足，4/4/3 不满足，4/3/3
            不满足。较大断点列数小于较小断点即判定失败
      llmPrompt: >-
        检查使用 List 组件展示重复内容的页面，lanes 属性必须按断点从小到大非递减设置列数。对同一个 List，sm/md/lg/xl 的列数序列不得下降，允许相邻断点列数相同。例如
        1/2/3 满足，2/2/3 满足，1/2/2 满足，2/2/2 满足，4/4/3 不满足，4/3/3 不满足。较大断点列数小于较小断点即判定失败
    fallback_policy: agent_assisted
  - id: CMP-MUST-02
    rule: >-
      WaterFlow columnsTemplate 必须按断点非递减设置列数。检查 WaterFlow 组件的 columnsTemplate 是否按断点从小到大非递减设置列数。对同一个
      WaterFlow，sm/md/lg/xl 的列数序列不得下降，允许相邻断点列数相同。例如 2/3/4 满足，3/3/4 满足，2/2/2 满足，4/4/3
      不满足，3/2/2 不满足。较大断点列数小于较小断点即判定失败
    detector_kind: case_constraint
    detector_config:
      targetPatterns:
        - '**/*.ets'
      kit:
        - 'ArkUI: WaterFlow'
      targetChecks:
        - target: '**/*.ets'
          astSignals: []
          llmPrompt: >-
            检查 WaterFlow 组件的 columnsTemplate 是否按断点从小到大非递减设置列数。对同一个 WaterFlow，sm/md/lg/xl
            的列数序列不得下降，允许相邻断点列数相同。例如 2/3/4 满足，3/3/4 满足，2/2/2 满足，4/4/3 不满足，3/2/2
            不满足。较大断点列数小于较小断点即判定失败
      llmPrompt: >-
        检查 WaterFlow 组件的 columnsTemplate 是否按断点从小到大非递减设置列数。对同一个 WaterFlow，sm/md/lg/xl 的列数序列不得下降，允许相邻断点列数相同。例如
