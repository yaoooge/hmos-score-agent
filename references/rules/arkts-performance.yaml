forbidden_patterns:
  - id: ARKTS-PERF-FORBID-001
    rule: 禁止使用可选参数 ? 作为性能敏感函数参数形式。
    detector:
      kind: static
      mode: regex
      config:
        fileExtensions:
          - .ets
        patterns:
          - \bfunction\s+[A-Za-z_$][\w$]*\s*\([^)]*\?:[^)]*\)
    fallback:
      policy: agent_assisted
    decisionCriteria:
      pass:
        - 已确认符合规则：禁止使用可选参数 ? 作为性能敏感函数参数形式。
      fail:
        - 存在违反规则的证据：禁止使用可选参数 ? 作为性能敏感函数参数形式。
      notApplicable:
        - 本次改动不涉及该规则约束场景。
      review:
        - 证据不足，无法稳定判断该规则。
    profile:
      scoring: true
      riskCode: PERFORMANCE_OR_LIFECYCLE_RISK
      suppressRubricRiskCodes: []
      metricGroups:
        - performance
        - static_quality
      impact: heavy
  - id: ARKTS-PERF-FORBID-002
    rule: 禁止使用联合类型数组。
    detector:
      kind: static
      mode: regex
      config:
        fileExtensions:
          - .ets
        patterns:
          - \([^\)]*\|[^\)]*\)\s*\[\]
          - \bArray\s*<[^>]*\|[^>]*>
    fallback:
      policy: agent_assisted
    decisionCriteria:
      pass:
        - 已确认符合规则：禁止使用联合类型数组。
      fail:
        - 存在违反规则的证据：禁止使用联合类型数组。
      notApplicable:
        - 本次改动不涉及该规则约束场景。
      review:
        - 证据不足，无法稳定判断该规则。
    profile:
      scoring: true
      riskCode: PERFORMANCE_OR_LIFECYCLE_RISK
      suppressRubricRiskCodes: []
      metricGroups:
        - performance
        - static_quality
      impact: heavy
  - id: ARKTS-PERF-FORBID-003
    rule: 禁止在数值数组字面量中混用整型和浮点型。
    detector:
      kind: static
      mode: regex
      config:
        fileExtensions:
          - .ets
        patterns:
          - \[[^\]\n]*\b\d+\.\d+\b[^\]\n]*\b\d+\b[^\]\n]*\]
          - \[[^\]\n]*\b\d+\b[^\]\n]*\b\d+\.\d+\b[^\]\n]*\]
        stripStringLiteralContents: true
    fallback:
      policy: agent_assisted
    decisionCriteria:
      pass:
        - 已确认符合规则：禁止在数值数组字面量中混用整型和浮点型。
      fail:
        - 存在违反规则的证据：禁止在数值数组字面量中混用整型和浮点型。
      notApplicable:
        - 本次改动不涉及该规则约束场景。
      review:
        - 证据不足，无法稳定判断该规则。
    profile:
      scoring: true
      riskCode: PERFORMANCE_OR_LIFECYCLE_RISK
      suppressRubricRiskCodes: []
      metricGroups:
        - performance
        - static_quality
      impact: heavy
  - id: ARKTS-PERF-FORBID-004
    rule: 禁止通过超大容量初始化或大跨度下标写入制造稀疏/退化数组。
    detector:
      kind: static
      mode: regex
      config:
        fileExtensions:
          - .ets
        patterns:
          - \bnew\s+Array\s*\(\s*(?:102[5-9]|10[3-9]\d|1[1-9]\d\d|[2-9]\d{3,})\s*\)
          - \b[A-Za-z_$][\w$]*\s*\[\s*(?:102[4-9]|10[3-9]\d|1[1-9]\d\d|[2-9]\d{3,})\s*\]\s*=
    fallback:
      policy: agent_assisted
    decisionCriteria:
      pass:
        - 已确认符合规则：禁止通过超大容量初始化或大跨度下标写入制造稀疏/退化数组。
      fail:
        - 存在违反规则的证据：禁止通过超大容量初始化或大跨度下标写入制造稀疏/退化数组。
      notApplicable:
        - 本次改动不涉及该规则约束场景。
      review:
        - 证据不足，无法稳定判断该规则。
    profile:
      scoring: true
      riskCode: PERFORMANCE_OR_LIFECYCLE_RISK
      suppressRubricRiskCodes: []
      metricGroups:
        - performance
        - static_quality
      impact: heavy
  - id: ARKTS-PERF-FORBID-005
    rule: 禁止在循环等热点路径中直接抛出异常。
    detector:
      kind: static
      mode: regex
      config:
        fileExtensions:
          - .ets
        patterns:
          - \b(?:for|while)\s*\([^)]*\)\s*\{[\s\S]{0,400}?\bthrow\s+new\s+Error\b
    fallback:
      policy: agent_assisted
    decisionCriteria:
      pass:
        - 已确认符合规则：禁止在循环等热点路径中直接抛出异常。
      fail:
