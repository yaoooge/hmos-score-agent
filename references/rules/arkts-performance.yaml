name: ArkTS 高性能编程实践
version: v1.0.0
summary: 基于 ArkTS 高性能编程实践规则整理的内部规则包，按 should / forbidden 分类，用于识别 HarmonyOS NEXT 生成代码中的常见性能风险。
rule_pack_meta:
  pack_id: arkts-performance
  source_name: Huawei-ArkTS-High-Performance-Programming-Practices
  source_version: performance-rules-2026-04-17
must_rules: []
should_rules:
  - id: ARKTS-PERF-SHOULD-001
    rule: 不变变量推荐使用 const 声明。
    detector:
      kind: static
      mode: arkts_static
      config:
        check: let_never_reassigned
        fileExtensions:
          - .ets
        patchOnly: true
        violationWhen: never_reassigned
    fallback:
      policy: agent_assisted
    decisionCriteria:
      pass:
        - 已确认符合规则：不变变量推荐使用 const 声明。
      fail:
        - 存在违反规则的证据：不变变量推荐使用 const 声明。
      notApplicable:
        - 本次改动不涉及该规则约束场景。
      review:
        - 证据不足，无法稳定判断该规则。
    profile:
      scoring: true
      riskCode: READABILITY_OR_MAINTAINABILITY_RISK
      suppressRubricRiskCodes: []
      metricGroups:
        - performance
        - static_quality
      impact: light
  - id: ARKTS-PERF-SHOULD-002
    rule: number 类型变量初始化后应避免整型与浮点型混用。
    detector:
      kind: static
      mode: regex
      config:
        fileExtensions:
          - .ets
        patterns:
          - \blet\s+([A-Za-z_$][\w$]*)\s*=\s*\d+\s*;[\s\S]{0,200}?\b\1\s*=\s*\d+\.\d+\b
          - \blet\s+([A-Za-z_$][\w$]*)\s*=\s*\d+\.\d+\s*;[\s\S]{0,200}?\b\1\s*=\s*\d+\b
    fallback:
      policy: agent_assisted
    decisionCriteria:
      pass:
        - 已确认符合规则：number 类型变量初始化后应避免整型与浮点型混用。
      fail:
        - 存在违反规则的证据：number 类型变量初始化后应避免整型与浮点型混用。
      notApplicable:
        - 本次改动不涉及该规则约束场景。
      review:
        - 证据不足，无法稳定判断该规则。
    profile:
      scoring: true
      riskCode: READABILITY_OR_MAINTAINABILITY_RISK
      suppressRubricRiskCodes: []
      metricGroups:
        - performance
        - static_quality
      impact: light
