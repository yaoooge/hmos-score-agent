name: HarmonyOS NEXT 生成代码评分
version: v1
summary: 面向 HarmonyOS NEXT 大模型生成代码的质量评分 Rubric，支持完整工程生成、续写代码、Bug 修复三类任务，采用自动初评 + 人工复核机制。

scope:
  include:
    - 代码实现质量
    - 工程组织质量
    - 架构与职责划分
    - 可维护性与可读性
    - HarmonyOS NEXT / ArkTS / ArkUI 规范符合度
    - 风险控制
    - 与既有工程一致性
    - 改动精准度与最小侵入性
  exclude:
    - 功能正确性验收
    - 产品视觉设计
    - UI 美观度
    - 测试验收结果
    - 编译通过率

modes:
  default_evaluation_mode: auto_precheck_with_human_review
  supported_evaluation_modes:
    - auto_precheck
    - auto_precheck_with_human_review
  output_detail_levels:
    - summary
    - standard
    - full

confidence_levels:
  high: 证据充分，判断稳定
  medium: 证据基本充分，存在少量不确定性
  low: 证据不足或上下文不足，需人工复核

input_schema:
  required:
    - task_type
    - task_description
    - target_scope
  properties:
    task_type:
      type: enum
      values:
        - full_generation
        - continuation
        - bug_fix
    task_description:
      type: string
    target_scope:
      type: object
      required:
        - path
        - scope_type
      properties:
        path:
          type: string
        scope_type:
          type: enum
          values:
            - project
            - module
            - file_set
            - diff
    reference_scope:
      type: object
      required: false
      properties:
        path:
          type: string
        scope_type:
          type: enum
          values:
            - project
            - module
            - file_set
            - diff
    standards_application_mode:
      type: enum
      default: additive_modifier
      values:
        - additive_modifier
        - gating_only
        - review_only
    evaluation_mode:
      type: enum
      default: auto_precheck_with_human_review
      values:
        - auto_precheck
        - auto_precheck_with_human_review
    output_detail_level:
      type: enum
      default: full
      values:
        - summary
        - standard
        - full
    enable_build_check:
      type: boolean
      default: false

standards_extension:
  architecture:
    principle: 基础 Rubric 定义主评分结构，规则集作为规则层接入，不单独形成第二套总分
    scoring_formula: 最终得分 = 基础 Rubric 得分 + 规则层修正结果（受硬门槛与总分上限约束）
  application_priority:
    - platform_rules
    - must_rules
    - forbidden_patterns
    - should_rules
  application_modes:
    additive_modifier:
      description: 默认模式，将规则命中结果映射到既有评分项并修正得分
      suitable_for:
        - 正式评分
        - 模型横向对比
    gating_only:
      description: 仅将规则作为红线门槛，主要用于触发扣分上限、风险项或人工复核
      suitable_for:
        - 规则尚未完全结构化阶段
        - 过渡期规范接入
    review_only:
      description: 规则只用于生成人工复核项和规则符合性观察，不直接修改总分
      suitable_for:
        - 规则稳定性不足阶段
        - 高主观性规范场景
  mapping_recommendation:
    naming:
      - 可维护性与可读性/命名表达清晰度
      - 与既有工程一致性/命名与风格一致性
    comments:
      - 可维护性与可读性/命名表达清晰度
      - 代码正确性与静态质量/静态坏味道控制
    formatting:
      - 工程结构与组织质量/目录结构合理性
      - 代码正确性与静态质量/静态坏味道控制
      - 与既有工程一致性/命名与风格一致性
    types:
      - 代码正确性与静态质量/ArkTS/ArkUI语法与类型安全
      - 平台规范符合度/ArkTS约束遵循度
      - 可维护性与可读性/可演进性
    functions:
      - 可维护性与可读性/复杂度控制
      - 架构与职责划分/页面或新增代码职责边界
      - 风险控制与稳定性/稳定性风险
    control_flow:
      - 可维护性与可读性/复杂度控制
      - 代码正确性与静态质量/静态坏味道控制
      - 风险控制与稳定性/稳定性风险
  conflict_policy:
    description: 当规范与平台规则冲突时，以平台规则为准；若无法自动裁决，则进入人工复核
    unresolved_action:
      - 降低相关项 confidence 为 low
      - 写入 human_review_queue
      - 不直接强判

hard_gates:
  - id: G1
    name: 高密度静态错误
    applies_to:
      - full_generation
      - continuation
      - bug_fix
    trigger_signals:
      - 大量未定义引用
      - 大量类型错误
      - import/export 错位明显
      - 明显不可运行代码片段密集出现
    score_cap: 69
  - id: G2
    name: 明显不符合 HarmonyOS NEXT / ArkTS 基本规范
    applies_to:
      - full_generation
      - continuation
      - bug_fix
    trigger_signals:
      - 大量 Web/Vue/React 思维硬套
      - 明显不符合 ArkTS 约束
      - 平台写法严重失真
    score_cap: 69
  - id: G3
    name: 严重工程风险
    applies_to:
      - full_generation
      - continuation
      - bug_fix
    trigger_signals:
      - 生命周期误用明显
      - 空值或异步竞争风险高
      - 敏感信息硬编码
      - 资源释放或监听清理存在明显风险
    score_cap: 79
  - id: G4
    name: Bug 修复任务中的误修或过修
    applies_to:
      - bug_fix
    trigger_signals:
      - 改动与问题点明显不匹配
      - 修改范围严重失控
      - 引入明显无关改动
    score_cap: 59

human_review_rules:
  force_review_when:
    - 任一评分项 confidence 为 low
    - 需要依据规则判断但未提供完整规则信息
    - continuation 或 bug_fix 缺少足够参考上下文
    - bug_fix 场景中无法确认是否真正命中根因
    - 触发任意硬门槛
    - 最终总分落在 68-71、78-81、88-91 临界带
    - 一级维度间结论冲突明显
  output_fields:
    - item
    - current_assessment
    - uncertainty_reason
    - suggested_focus

rules_policy:
  must_rules:
    handling: 若明显违反，可直接降分；严重违反可触发硬门槛或专项风险项
  should_rules:
    handling: 影响评分项得分修正，不直接触发硬门槛
  forbidden_patterns:
    handling: 一旦命中，必须进入风险项，并降低相关项评分

task_templates:
  full_generation:
    scenario: 用户提供完整 HarmonyOS NEXT 工程、模块骨架或大段新生成代码，目标是评价其作为新工程产物的质量。
    total_score: 100
    scoring_method: discrete_band
    scoring_note: 二级指标按离散档位给分，默认不做插值；若证据不足，可降低置信度并进入人工复核，但不要用猜测补足分数。
    dimensions:
      - name: 工程结构与组织质量
        weight: 20
        intent: 目录结构、模块边界、公共能力组织
        items:
          - name: 目录结构合理性
            weight: 7
            scoring_bands:
              - score: 7
                criteria: 目录分层自然，页面、组件、状态、服务、工具、资源等落位稳定，无明显模板残留，后续扩展路径清晰。
              - score: 5
                criteria: 主体结构合理，少量文件落位不够理想或存在轻微过度拆分，但整体仍容易接手。
              - score: 3
                criteria: 基本能看懂，但存在多处职责错位、目录命名含糊或脚手架残留，扩展路径不够稳定。
              - score: 1
                criteria: 目录组织混乱，文件落位大量不合理，阅读者难以快速判断模块归属。
              - score: 0
                criteria: 目录结构严重失真，基本无法作为可接手工程组织。
          - name: 模块边界清晰度
            weight: 7
            scoring_bands:
              - score: 7
                criteria: 模块职责边界明确，跨模块依赖关系克制，分层方向稳定，不依赖隐式耦合。
              - score: 5
                criteria: 主要边界清楚，仅有少量交叉依赖或职责粘连，但不影响整体理解。
              - score: 3
                criteria: 若干模块职责重叠，页面层、状态层、工具层之间边界模糊，后续演进成本偏高。
              - score: 1
                criteria: 模块耦合明显，跨层调用随意，职责划分失效。
              - score: 0
                criteria: 基本不存在有效模块边界，代码呈现大块堆叠或任意串联。
          - name: 公共能力组织质量
            weight: 6
            scoring_bands:
              - score: 6
                criteria: 通用能力抽取位置正确，复用路径清楚，既不散落在页面层，也不过度包装。
              - score: 4
                criteria: 已有一定抽取与复用，但仍存在局部重复实现或公共层轻微臃肿。
              - score: 2
                criteria: 公共逻辑散落、多处复制粘贴，或把本应局部的逻辑错误上提为公共层。
              - score: 0
                criteria: 公共能力组织明显失控，复用关系和职责归属都不成立。

      - name: 代码正确性与静态质量
        weight: 20
        intent: ArkTS/ArkUI 语法、类型安全、明显错误密度
        items:
          - name: ArkTS/ArkUI语法与类型安全
            weight: 8
            scoring_bands:
              - score: 8
                criteria: 无明显 ArkTS/ArkUI 语法错误，类型声明完整，空值、异步、接口返回值等关键位置处理稳定。
              - score: 6
                criteria: 存在少量局部类型宽松、可空处理不够严谨或类型推断依赖过强，但不构成成片错误。
              - score: 4
                criteria: 有多处类型或语法层面的可疑点，需要人工补修后才能稳定接手。
              - score: 2
                criteria: 明显存在较多类型错误、未定义引用、导入导出不稳或 ArkTS 约束冲突。
              - score: 0
                criteria: 高密度静态错误或明显不可运行片段，接近触发 G1/G2。
          - name: 静态坏味道控制
            weight: 6
            scoring_bands:
              - score: 6
                criteria: 重复逻辑、死代码、魔法值、过长方法、无意义包装等坏味道控制良好，无明显积累。
              - score: 4
                criteria: 有少量坏味道，但局部且可接受，不影响整体质量判断。
              - score: 2
                criteria: 坏味道分布较广，阅读和修改成本明显上升。
              - score: 0
                criteria: 代码坏味道密集出现，已明显影响可信度和可维护性。
          - name: 明显错误密度
            weight: 6
            scoring_bands:
              - score: 6
                criteria: 几乎看不到明显错误点，偶发问题不形成模式。
              - score: 4
                criteria: 有少量单点错误，但集中修补成本较低，不影响整体结构判断。
              - score: 2
                criteria: 多个文件或关键链路出现明显错误，整体可信度下降。
              - score: 0
                criteria: 错误呈片状分布，工程整体可用性很低。

      - name: 架构与职责划分
        weight: 20
        intent: 页面/组件职责、状态与数据流、复用与抽象
        items:
          - name: 页面/组件职责分离
            weight: 8
            scoring_bands:
              - score: 8
                criteria: 页面负责组装与编排，组件负责展示或局部交互，业务逻辑、数据处理、状态变更没有无序堆在页面层。
              - score: 6
                criteria: 主要职责分离合理，但个别页面仍承担少量不该承担的逻辑。
              - score: 4
                criteria: 页面层出现较多业务逻辑或组件职责不稳，需要重整边界。
              - score: 2
                criteria: 页面、组件、服务职责混杂明显，维护时需要跨层追踪。
              - score: 0
                criteria: 职责划分基本失效，结构无法支撑继续开发。
          - name: 状态与数据流组织
            weight: 6
            scoring_bands:
              - score: 6
                criteria: 状态来源、流向、更新点和副作用位置清楚，数据流单向且容易追踪。
              - score: 4
                criteria: 大体可追踪，但存在少量重复状态、状态落位不佳或局部更新链条绕。
              - score: 2
                criteria: 状态散落、数据流跳跃，多处隐式耦合，理解成本高。
              - score: 0
                criteria: 状态和数据流组织失控，运行和维护风险都高。
          - name: 复用与抽象合理性
            weight: 6
            scoring_bands:
              - score: 6
                criteria: 抽象粒度合适，复用建立在稳定共性上，没有明显欠抽象或过度抽象。
              - score: 4
                criteria: 有一定复用意识，但部分抽象边界不够稳，仍可接受。
              - score: 2
                criteria: 要么大量重复实现，要么抽象层级过多、包装过重，实际增加理解成本。
              - score: 0
                criteria: 抽象与复用策略明显错误，结构性问题突出。

      - name: 可维护性与可读性
        weight: 15
        intent: 命名、复杂度、可演进性
        items:
          - name: 命名表达清晰度
            weight: 5
            scoring_bands:
              - score: 5
                criteria: 类型、变量、方法、组件、文件命名准确表达职责和语义，几乎无歧义缩写。
              - score: 4
                criteria: 大部分命名清楚，只有少量泛化命名或不够稳定的缩写。
              - score: 3
                criteria: 基本能读懂，但泛化命名较多，需要结合上下文猜测语义。
              - score: 2
                criteria: 命名较弱，阅读时频繁需要反查实现。
              - score: 1
                criteria: 命名混乱或误导明显。
              - score: 0
                criteria: 命名失效，几乎不具备直接可读性。
          - name: 复杂度控制
            weight: 5
            scoring_bands:
              - score: 5
                criteria: 方法长度、分支深度、条件组织和依赖关系控制良好，单点修改影响范围可预测。
              - score: 4
                criteria: 少量局部复杂度偏高，但总体仍可维护。
              - score: 3
                criteria: 若干核心位置复杂度偏高，修改风险开始上升。
              - score: 2
                criteria: 高复杂度点较多，接手成本显著增加。
              - score: 1
                criteria: 复杂度明显失控。
              - score: 0
                criteria: 复杂度严重失控，难以安全修改。
          - name: 可演进性
            weight: 5
            scoring_bands:
              - score: 5
                criteria: 当前实现留有明确扩展位，新增需求时无需大面积推翻现有结构。
              - score: 4
                criteria: 整体可演进，仅少量位置扩展成本偏高。
              - score: 3
                criteria: 可继续迭代，但若需求扩展较快，现有结构很快会变脆。
              - score: 2
                criteria: 结构对变化不友好，新增需求很可能引发连锁修改。
              - score: 1
                criteria: 演进路径狭窄，局部已经呈现硬编码或一次性实现。
              - score: 0
                criteria: 基本不可演进，需要重构后才能扩展。

      - name: 平台规范符合度
        weight: 15
        intent: ArkUI 组织方式、ArkTS 约束、HarmonyOS 工程实践
        items:
          - name: ArkUI组织方式合理性
            weight: 5
            scoring_bands:
              - score: 5
                criteria: ArkUI 页面、组件、状态、事件和布局组织符合平台习惯，没有明显 Web 框架思维硬套。
              - score: 4
                criteria: 整体符合 ArkUI 组织方式，仅少量写法不够自然。
              - score: 3
                criteria: 基本可识别为 ArkUI 写法，但存在若干不自然迁移痕迹。
              - score: 2
                criteria: 多处写法偏离 ArkUI 组织习惯，平台适配感较弱。
              - score: 1
                criteria: 明显硬套其他前端框架组织方式。
              - score: 0
                criteria: 平台组织方式严重失真，接近触发 G2。
          - name: ArkTS约束遵循度
            weight: 5
            scoring_bands:
              - score: 5
                criteria: 无明显违反 ArkTS 受限语法、类型系统或规则集约束的写法。
              - score: 4
                criteria: 有少量边缘性不稳写法，但不构成明显违规模式。
              - score: 3
                criteria: 存在若干需要整改的约束问题，尚未形成系统性失真。
              - score: 2
                criteria: 多处命中 must/forbidden 风险，合规性明显不足。
              - score: 1
                criteria: 约束违反密集出现。
              - score: 0
                criteria: 明显不符合 ArkTS 基本约束，接近触发 G2。
          - name: HarmonyOS工程实践符合度
            weight: 5
            scoring_bands:
              - score: 5
                criteria: 生命周期、资源组织、模块接入、页面能力使用等工程实践符合 HarmonyOS NEXT 常规要求。
              - score: 4
                criteria: 主体实践合理，仅少量工程化细节不够稳。
              - score: 3
                criteria: 具备基本工程意识，但有多处实践不规范或接入方式欠妥。
              - score: 2
                criteria: 工程实践问题较多，后续集成和维护风险明显。
              - score: 1
                criteria: 平台工程实践明显失真。
              - score: 0
                criteria: 基本不符合 HarmonyOS 工程接入习惯。

      - name: 风险控制与稳定性
        weight: 10
        intent: 稳定性、性能、安全边界
        items:
          - name: 稳定性风险
            weight: 4
            scoring_bands:
              - score: 4
                criteria: 生命周期、空值、异步时序、监听清理、资源释放等风险控制良好，无明显高危点。
              - score: 3
                criteria: 有轻微单点风险，但影响面有限且容易修补。
              - score: 2
                criteria: 存在多处稳定性隐患，可能影响核心链路。
              - score: 1
                criteria: 高风险点明显，接近触发 G3。
              - score: 0
                criteria: 严重稳定性风险密集存在，难以放心接手。
          - name: 性能风险
            weight: 3
            scoring_bands:
              - score: 3
                criteria: 无明显重复计算、无意义渲染、状态冗余或高成本操作堆叠问题。
              - score: 2
                criteria: 有少量性能隐患，但主要位于非关键路径或容易修补。
              - score: 1
                criteria: 性能风险较明显，已经影响实现质量判断。
              - score: 0
                criteria: 存在显著性能问题，后续代价高。
          - name: 安全与边界意识
            weight: 3
            scoring_bands:
              - score: 3
                criteria: 对输入、权限、异常、资源、敏感信息等边界有基本防护意识，无明显越界写法。
              - score: 2
                criteria: 有边界意识，但个别位置防护不完整。
              - score: 1
                criteria: 边界控制薄弱，存在明显遗漏或不安全习惯。
              - score: 0
                criteria: 出现敏感信息硬编码、危险边界处理或其他严重问题。
    common_risks:
      - 直接照搬 Web / React / Vue 组织方式。
      - ArkUI 页面结构失真，UI 与状态杂糅。
      - 生成大量看起来很多但不可接手的模板代码。
      - 公共能力抽取位置混乱，后续扩展困难。
    report_emphasis:
      - 工程能否作为高置信的新工程产物接手。
      - 哪些问题属于结构性问题，而不是局部瑕疵。
      - 是否触发 G1 / G2 / G3 硬门槛候选。

  continuation:
    scenario: 用户提供原工程 + 新增代码、模块接入结果、页面接入 diff，目标是评价增量开发是否自然融入既有工程。
    total_score: 100
    scoring_method: discrete_band
    scoring_note: 二级指标按离散档位给分，重点看是否自然融入原工程；若 reference_scope 不足以支撑判断，应降低置信度并进入人工复核。
    dimensions:
      - name: 与既有工程一致性
        weight: 20
        intent: 命名风格、目录接入、复用既有能力
        items:
          - name: 命名与风格一致性
            weight: 7
            scoring_bands:
              - score: 7
                criteria: 新增代码在命名、注释习惯、文件组织、格式风格上与原工程高度一致，几乎看不出外来痕迹。
              - score: 5
                criteria: 主体风格一致，少量局部命名或书写习惯偏离，但不影响整体融入感。
              - score: 3
                criteria: 能接入原工程，但新增代码有较明显自成体系的风格。
              - score: 1
                criteria: 风格差异明显，review 时可以一眼区分出新增部分与原代码。
              - score: 0
                criteria: 基本未对齐既有风格，新增代码与原工程割裂。
          - name: 目录/模块接入一致性
            weight: 7
            scoring_bands:
              - score: 7
                criteria: 新增文件落位、模块接入方式、引用方向和组织层级与原工程模式一致，没有新建不必要旁路结构。
              - score: 5
                criteria: 接入路径总体合理，少量文件落位或模块切分略偏，但仍可接受。
              - score: 3
                criteria: 功能勉强接入成功，但目录或模块接法与原工程习惯不完全匹配。
              - score: 1
                criteria: 接入方式明显偏离原工程模式，后续维护者需要重新适应。
              - score: 0
                criteria: 接入策略明显错误，破坏原有结构秩序。
          - name: 复用既有能力程度
            weight: 6
            scoring_bands:
              - score: 6
                criteria: 优先复用原工程已有组件、状态、工具、服务和封装能力，只在必要处新增实现。
              - score: 4
                criteria: 大部分已复用，但仍有局部重复实现或没有充分利用已有公共能力。
              - score: 2
                criteria: 明显存在能复用却不复用的情况，新增实现和既有能力并存。
              - score: 0
                criteria: 大量重复造轮子，基本无视原工程积累。

      - name: 代码正确性与静态质量
        weight: 20
        intent: ArkTS/ArkUI 语法、类型安全、明显错误
        items:
          - name: ArkTS/ArkUI语法与类型安全
            weight: 8
            scoring_bands:
              - score: 8
                criteria: 增量代码无明显 ArkTS/ArkUI 语法问题，类型接入稳定，与原工程接口和状态定义衔接自然。
              - score: 6
                criteria: 存在少量局部类型宽松或边界处理不够严谨，但不影响整体接入稳定性。
              - score: 4
                criteria: 有多处类型或语法可疑点，接入质量需要补修。
              - score: 2
                criteria: 明显存在较多类型问题、未定义引用、接口对不齐或 ArkTS 约束冲突。
              - score: 0
                criteria: 高密度静态错误，增量代码本身缺乏基本可接手性。
          - name: 静态坏味道控制
            weight: 6
            scoring_bands:
              - score: 6
                criteria: 新增代码在重复逻辑、死代码、魔法值、冗余包装和过长方法方面控制良好。
              - score: 4
                criteria: 有少量坏味道，但局部且容易清理。
              - score: 2
                criteria: 坏味道较多，已经拉低增量代码质量。
              - score: 0
                criteria: 坏味道密集，说明增量开发质量不稳定。
          - name: 明显错误密度
            weight: 6
            scoring_bands:
              - score: 6
                criteria: 几乎无明显错误，局部问题不形成模式。
              - score: 4
                criteria: 有少量单点错误，但容易定位和修复。
              - score: 2
                criteria: 多个修改点存在明显错误，可信度下降。
              - score: 0
                criteria: 错误呈片状分布，增量代码整体不可靠。

      - name: 架构与职责划分
        weight: 15
        intent: 新增代码边界、状态接入、能力抽取
        items:
          - name: 新增代码职责边界
            weight: 5
            scoring_bands:
              - score: 5
                criteria: 新增页面、组件、服务、状态、工具的职责与原工程边界兼容，没有把新需求硬塞进不适合的层。
              - score: 4
                criteria: 主要边界合理，少量实现位置不够理想。
              - score: 3
                criteria: 基本能工作，但边界开始松动，需要靠上下文理解职责归属。
              - score: 2
                criteria: 多处边界不清，新增逻辑对原结构造成污染。
              - score: 1
                criteria: 职责错位明显，后续维护成本高。
              - score: 0
                criteria: 新增代码严重破坏原有职责分层。
          - name: 状态接入合理性
            weight: 5
            scoring_bands:
              - score: 5
                criteria: 新增状态接入遵循原工程状态管理模式，状态来源、更新链路和消费位置清晰。
              - score: 4
                criteria: 基本合理，个别状态落位或更新路径不够优。
              - score: 3
                criteria: 能运行，但存在重复状态、同步链条绕或局部隐式耦合。
              - score: 2
                criteria: 状态接入混乱，容易引发维护和回归问题。
              - score: 1
                criteria: 状态管理明显失稳。
              - score: 0
                criteria: 状态接入方式与原工程严重冲突。
          - name: 组件/能力抽取合理性
            weight: 5
            scoring_bands:
              - score: 5
                criteria: 仅在稳定共性上抽取组件或公共能力，抽取粒度和原工程风格一致。
              - score: 4
                criteria: 抽取基本合理，但存在少量偏早抽象或局部重复。
              - score: 3
                criteria: 抽取策略一般，后续可能需要重整。
              - score: 2
                criteria: 抽取不足或过度抽取较明显，增加理解成本。
              - score: 1
                criteria: 抽取策略明显不当。
              - score: 0
                criteria: 抽取和复用完全失衡，影响原工程结构。

      - name: 可维护性与可读性
        weight: 15
        intent: 命名、复杂度、可演进性
        items:
          - name: 命名表达清晰度
            weight: 5
            scoring_bands:
              - score: 5
                criteria: 新增类型、变量、方法、组件命名清楚表达语义，并与原工程命名体系一致。
              - score: 4
                criteria: 大部分命名清楚，少量泛化命名不影响整体理解。
              - score: 3
                criteria: 基本能读懂，但需要较多上下文辅助。
              - score: 2
                criteria: 命名较弱，理解成本偏高。
              - score: 1
                criteria: 命名误导或混乱明显。
              - score: 0
                criteria: 命名已不足以支持有效 review。
          - name: 复杂度控制
            weight: 5
            scoring_bands:
              - score: 5
                criteria: 增量实现保持简单直接，分支、依赖、嵌套和调用链都控制得当。
              - score: 4
                criteria: 局部复杂度略高，但总体仍可维护。
              - score: 3
                criteria: 有若干复杂点，后续修改风险开始上升。
              - score: 2
                criteria: 复杂度偏高，维护者需要跨文件追踪较多逻辑。
              - score: 1
                criteria: 复杂度明显失控。
              - score: 0
                criteria: 增量实现复杂且脆弱，不适合继续迭代。
          - name: 可演进性
            weight: 5
            scoring_bands:
              - score: 5
                criteria: 新增能力与原工程结构兼容，后续扩展只需局部追加，不必回改大面积代码。
              - score: 4
                criteria: 整体可演进，仅少量位置扩展成本偏高。
              - score: 3
                criteria: 能继续迭代，但结构弹性一般。
              - score: 2
                criteria: 扩展容易牵动多处代码。
              - score: 1
                criteria: 实现偏一次性，后续变更代价高。
              - score: 0
                criteria: 几乎没有健康演进空间。

      - name: 平台规范符合度
        weight: 15
        intent: ArkUI 组织、ArkTS 约束、HarmonyOS 工程实践
        items:
          - name: ArkUI组织方式合理性
            weight: 5
            scoring_bands:
              - score: 5
                criteria: 新增页面和组件遵循 ArkUI 组织方式，与原工程的 ArkUI 写法风格一致。
              - score: 4
                criteria: 主体合理，只有少量写法不够自然。
              - score: 3
                criteria: 基本符合 ArkUI 写法，但迁移痕迹较明显。
              - score: 2
                criteria: 多处偏离 ArkUI 组织习惯。
              - score: 1
                criteria: 明显硬套其他前端框架思路。
              - score: 0
                criteria: 平台组织方式严重失真。
          - name: ArkTS约束遵循度
            weight: 5
            scoring_bands:
              - score: 5
                criteria: 新增改动未明显违反 ArkTS 受限语法、类型和规则集约束。
              - score: 4
                criteria: 有少量边缘问题，但不形成明确违规模式。
              - score: 3
                criteria: 存在若干需要整改的约束问题。
              - score: 2
                criteria: 多处触碰 must/forbidden 风险。
              - score: 1
                criteria: 约束违反较多。
              - score: 0
                criteria: 明显不符合 ArkTS 基本要求。
          - name: HarmonyOS工程实践符合度
            weight: 5
            scoring_bands:
              - score: 5
                criteria: 新增接入遵循 HarmonyOS NEXT 生命周期、资源组织、模块能力和页面接入实践。
              - score: 4
                criteria: 主体实践合理，只有少量工程化细节不稳。
              - score: 3
                criteria: 基本具备工程意识，但存在多处实践欠妥。
              - score: 2
                criteria: 工程实践问题较多，集成风险明显。
              - score: 1
                criteria: 平台工程实践明显偏离。
              - score: 0
                criteria: 接入方式基本不符合 HarmonyOS 工程习惯。

      - name: 风险控制与稳定性
        weight: 10
        intent: 稳定性、性能、安全边界
        items:
          - name: 稳定性风险
            weight: 4
            scoring_bands:
              - score: 4
                criteria: 新增逻辑对生命周期、空值、异步时序、监听和资源释放控制稳妥，没有明显高危点。
              - score: 3
                criteria: 有轻微单点风险，但容易修补。
              - score: 2
                criteria: 存在多处稳定性隐患，可能影响原工程核心链路。
              - score: 1
                criteria: 风险较高，接近触发 G3。
              - score: 0
                criteria: 严重稳定性风险明显。
          - name: 性能风险
            weight: 3
            scoring_bands:
              - score: 3
                criteria: 新增改动没有引入明显重复计算、无意义重绘或高成本链路。
              - score: 2
                criteria: 有少量性能隐患，但主要位于非关键路径。
              - score: 1
                criteria: 性能风险已经可见，可能影响体验或维护。
              - score: 0
                criteria: 引入明显性能问题。
          - name: 安全与边界意识
            weight: 3
            scoring_bands:
              - score: 3
                criteria: 对输入、权限、异常、资源和敏感信息边界有基本控制，没有明显冒险写法。
              - score: 2
                criteria: 主体合理，但个别边界处理不完整。
              - score: 1
                criteria: 边界控制薄弱，存在明显遗漏。
              - score: 0
                criteria: 出现严重边界或安全问题。

      - name: 改动范围合理性
        weight: 5
        intent: 改动聚焦度、无关改动控制
        items:
          - name: 改动聚焦度
            weight: 3
            scoring_bands:
              - score: 3
                criteria: 改动基本只覆盖实现需求所必需的文件和链路，diff 聚焦且容易 review。
              - score: 2
                criteria: 主体聚焦，少量顺手调整可以解释。
              - score: 1
                criteria: 改动扩散较多，review 需要甄别大量旁路变化。
              - score: 0
                criteria: 改动范围明显失控，难以判定主问题。
          - name: 无关改动控制
            weight: 2
            scoring_bands:
              - score: 2
                criteria: 几乎没有无关清理、顺手重构、格式噪音或风格改写。
              - score: 1
                criteria: 存在一定无关改动，但尚未淹没主要需求。
              - score: 0
                criteria: 无关改动占比高，影响对本次任务的有效评估。
    common_risks:
      - 只看新增文件，不对照原工程模式就下结论。
      - 忽略无关改动、顺手重构、样式噪音。
      - 对复用不足和团队允许局部实现判断不清。
      - reference_scope 不足时仍给出高置信度结论。
    report_emphasis:
      - 新增代码是否融入原工程。
      - 改动是否聚焦，是否存在无关改动。
      - 复用既有能力是否充分。
      - 证据不足时要明确加入人工复核项。

  bug_fix:
    scenario: 用户提供 Bug 修复 diff、修复前后代码、问题描述与修复结果，目标是评价修复是否命中问题且控制侵入范围。
    total_score: 100
    scoring_method: discrete_band
    scoring_note: 二级指标按离散档位给分，bug_fix 场景优先看是否命中问题、是否过修、是否引入新风险；若根因证据不足，应降低置信度并进入人工复核。
    dimensions:
      - name: 改动精准度与最小侵入性
        weight: 25
        intent: 评价是否精准修复问题且控制改动范围
        items:
          - name: 问题点命中程度
            weight: 10
            scoring_bands:
              - score: 10
                criteria: 修改直接命中根因或完整故障链路，修复点与问题描述、现象、上下文高度一致，没有靠碰运气规避问题。
              - score: 8
                criteria: 明确命中主要问题点，根因判断基本成立，仅少量链路证据不够充分。
              - score: 6
                criteria: 修复能覆盖主要症状，且大概率触达真正原因，但根因闭环不够完整。
              - score: 3
                criteria: 主要是在症状层做补丁，是否真正解决问题仍不稳定。
              - score: 0
                criteria: 改动与问题点明显不匹配，属于误修或未修到位。
          - name: 修改范围克制度
            weight: 8
            scoring_bands:
              - score: 8
                criteria: 改动只触及解决问题所必需的代码路径，文件数、修改面和影响半径都控制得很克制。
              - score: 6
                criteria: 范围总体克制，存在少量可解释的附带修改。
              - score: 4
                criteria: 改动范围偏大，但大部分仍与修复链路相关。
              - score: 2
                criteria: 修改明显扩散，已经出现过修迹象。
              - score: 0
                criteria: 改动范围严重失控，接近或达到 G4。
          - name: 无关重构控制
            weight: 7
            scoring_bands:
              - score: 7
                criteria: 没有引入与修复无关的重构、风格清理或结构调整，diff 噪音极低。
              - score: 5
                criteria: 仅有少量无关优化，但不影响问题判断和 review。
              - score: 3
                criteria: 存在较明显的顺手修改，需要额外甄别主次。
              - score: 1
                criteria: 无关重构占比偏高，掩盖修复主体。
              - score: 0
                criteria: diff 主要被无关调整占据，难以确认真实修复内容。

      - name: 代码正确性与静态质量
        weight: 20
        intent: ArkTS/ArkUI 语法、类型安全、明显错误
        items:
          - name: ArkTS/ArkUI语法与类型安全
            weight: 8
            scoring_bands:
              - score: 8
                criteria: 修复后的改动无明显 ArkTS/ArkUI 语法问题，类型关系稳定，没有靠弱类型逃逸完成修复。
              - score: 6
                criteria: 存在少量边界性类型问题，但不影响整体修复质量。
              - score: 4
                criteria: 有多处类型或语法可疑点，修复质量需要补强。
              - score: 2
                criteria: 通过引入较多类型问题、未定义引用或不合规写法完成修补。
              - score: 0
                criteria: 高密度静态错误或明显违反 ArkTS 基本约束。
          - name: 静态坏味道控制
            weight: 6
            scoring_bands:
              - score: 6
                criteria: 修复实现保持简洁，没有新增重复逻辑、死代码、魔法值堆积或无意义包装。
              - score: 4
                criteria: 有少量坏味道，但不影响主要修复判断。
              - score: 2
                criteria: 为修 bug 引入了较多坏味道，后续债务明显。
              - score: 0
                criteria: 修复方式本身制造了密集坏味道。
          - name: 明显错误密度
            weight: 6
            scoring_bands:
              - score: 6
                criteria: 修复改动几乎没有新的明显错误，单点问题不形成模式。
              - score: 4
                criteria: 有少量明显错误，但局部且容易修补。
              - score: 2
                criteria: 多处新增错误或旧问题未消除，可信度明显下降。
              - score: 0
                criteria: 错误密度高，修复产物整体不可靠。

      - name: 与既有工程一致性
        weight: 15
        intent: 命名风格、结构接入、原模式复用
        items:
          - name: 命名与风格一致性
            weight: 5
            scoring_bands:
              - score: 5
                criteria: 修复代码在命名、注释、格式和组织方式上与原工程一致，review 成本低。
              - score: 4
                criteria: 主体一致，仅少量局部风格差异。
              - score: 3
                criteria: 基本可接受，但新增片段略显游离。
              - score: 2
                criteria: 风格差异明显，维护者需要额外适应。
              - score: 1
                criteria: 命名和风格偏离较大。
              - score: 0
                criteria: 修复代码与原工程明显割裂。
          - name: 结构接入一致性
            weight: 5
            scoring_bands:
              - score: 5
                criteria: 修复发生在原本最合理的位置，未为了修 bug 新建不必要层级或绕开既有结构。
              - score: 4
                criteria: 接入位置基本合理，少量实现位置还能优化。
              - score: 3
                criteria: 能完成修复，但结构接法一般。
              - score: 2
                criteria: 修复位置不理想，局部破坏原结构秩序。
              - score: 1
                criteria: 明显通过旁路结构或临时层规避问题。
              - score: 0
                criteria: 修复方式严重破坏原结构。
          - name: 原模式复用程度
            weight: 5
            scoring_bands:
              - score: 5
                criteria: 修复优先沿用原有组件、工具、状态、错误处理和抽象方式，不重复造轮子。
              - score: 4
                criteria: 主体复用到位，少量局部实现可进一步对齐。
              - score: 3
                criteria: 复用一般，存在一些重复修补。
              - score: 2
                criteria: 明显未沿用原模式，增加维护分叉。
              - score: 1
                criteria: 大量重复或旁路实现。
              - score: 0
                criteria: 基本无视原工程模式。

      - name: 风险控制与稳定性
        weight: 15
        intent: 回归风险、稳定性风险、安全/边界意识
        items:
          - name: 回归风险控制
            weight: 6
            scoring_bands:
              - score: 6
                criteria: 修复同时兼顾受影响分支、边界场景和原有契约，不引入新的主要回归窗口。
              - score: 4
                criteria: 回归风险总体受控，仍有少量场景覆盖不够充分。
              - score: 2
                criteria: 存在较明显回归窗口或行为副作用。
              - score: 0
                criteria: 明显引入高回归风险或新故障链路。
          - name: 稳定性风险
            weight: 5
            scoring_bands:
              - score: 5
                criteria: 修复后在空值、异步时序、生命周期、监听清理和资源释放方面保持稳定，没有新增高危点。
              - score: 4
                criteria: 有轻微单点风险，但影响可控。
              - score: 3
                criteria: 存在若干稳定性隐患，需要补充处理。
              - score: 1
                criteria: 高风险点明显，已影响修复可信度。
              - score: 0
                criteria: 严重稳定性风险，接近或达到 G3。
          - name: 安全/边界意识
            weight: 4
            scoring_bands:
              - score: 4
                criteria: 修复对输入、异常、权限、资源和敏感信息边界处理稳妥，没有引入新的边界漏洞。
              - score: 3
                criteria: 主体合理，只有少量边界处理不够完备。
              - score: 2
                criteria: 边界控制存在明显遗漏。
              - score: 1
                criteria: 有较高边界风险。
              - score: 0
                criteria: 出现严重边界或安全问题。

      - name: 平台规范符合度
        weight: 10
        intent: ArkTS/ArkUI 规范、HarmonyOS 工程实践
        items:
          - name: ArkTS/ArkUI规范符合度
            weight: 5
            scoring_bands:
              - score: 5
                criteria: 修复方式符合 ArkTS/ArkUI 规范，没有使用违规语法、弱类型逃逸或平台不推荐模式硬修问题。
              - score: 4
                criteria: 主体符合规范，仅有少量边缘问题。
              - score: 3
                criteria: 基本可接受，但存在若干需要整改的规范问题。
              - score: 2
                criteria: 明显触碰 must/forbidden 风险。
              - score: 1
                criteria: 平台规范偏离较大。
              - score: 0
                criteria: 明显不符合 ArkTS/ArkUI 基本规范。
          - name: HarmonyOS工程实践符合度
            weight: 5
            scoring_bands:
              - score: 5
                criteria: 修复遵循 HarmonyOS NEXT 的生命周期、资源、页面能力和工程接入实践。
              - score: 4
                criteria: 大体符合，少量工程化细节可优化。
              - score: 3
                criteria: 基本具备工程意识，但仍有多处实践欠妥。
              - score: 2
                criteria: 工程实践问题较多，后续集成风险明显。
              - score: 1
                criteria: 平台工程实践明显失真。
              - score: 0
                criteria: 修复方式基本不符合 HarmonyOS 工程习惯。

      - name: 可维护性与可读性
        weight: 10
        intent: 修改点可理解性、复杂度、可演进性
        items:
          - name: 修改点可理解性
            weight: 4
            scoring_bands:
              - score: 4
                criteria: 修改原因、位置和逻辑链路都很清楚，review 者能快速看懂为什么这样修。
              - score: 3
                criteria: 主体可理解，少量链路需要额外追踪。
              - score: 2
                criteria: 理解修复意图需要跨文件反复跳转。
              - score: 1
                criteria: 修改意图较隐晦，review 成本高。
              - score: 0
                criteria: 几乎无法直接理解修复策略。
          - name: 复杂度控制
            weight: 3
            scoring_bands:
              - score: 3
                criteria: 修复实现保持简单直接，没有为了修单点问题引入复杂包装或多余分支。
              - score: 2
                criteria: 局部复杂度有所上升，但仍在可接受范围。
              - score: 1
                criteria: 修复显著增加复杂度。
              - score: 0
                criteria: 修复方式复杂且脆弱。
          - name: 可演进性
            weight: 3
            scoring_bands:
              - score: 3
                criteria: 修复为后续继续定位类似问题或扩展处理留有健康空间，不会把问题永久写死。
              - score: 2
                criteria: 基本可维护，但扩展和后续调整成本一般。
              - score: 1
                criteria: 修复偏一次性补丁，后续容易继续堆补丁。
              - score: 0
                criteria: 修复明显埋下后续演进债务。

      - name: 架构与职责影响控制
        weight: 5
        intent: 是否破坏原边界、是否引入额外耦合
        items:
          - name: 是否破坏原边界
            weight: 3
            scoring_bands:
              - score: 3
                criteria: 修复保持原有页面、组件、状态、服务之间的职责边界，没有为修 bug 打破分层。
              - score: 2
                criteria: 有轻微边界泄漏，但尚可接受。
              - score: 1
                criteria: 边界破坏较明显，后续维护成本升高。
              - score: 0
                criteria: 为修 bug 明显打穿原有分层。
          - name: 是否引入额外耦合
            weight: 2
            scoring_bands:
              - score: 2
                criteria: 没有新增不必要耦合，修复依赖关系与原工程模式一致。
              - score: 1
                criteria: 新增了一定耦合，但仍能解释。
              - score: 0
                criteria: 引入明显额外耦合，后续问题定位会更困难。
    common_risks:
      - 没有问题描述或参考上下文，却给出高置信结论。
      - 把修复完成误当成工程质量高。
      - 因顺手优化造成 diff 噪音和误修。
      - 在小问题上引入大范围结构改造。
    report_emphasis:
      - 是否命中问题点。
      - 是否存在误修、过修、无关重构。
      - 是否触发 G4 硬门槛候选。
      - 回归风险与边界风险是否被控制。

execution_flow:
  - step: 1
    name: 识别任务类型
    description: 根据 task_type 选择对应评分模板；若未明确给出，则依据任务描述推断并说明依据
  - step: 2
    name: 读取评分范围
    description: 读取 target_scope；对于 continuation 与 bug_fix，优先读取 reference_scope 作为对照上下文
  - step: 3
    name: 提取证据
    description: 从结构、代码、风险、一致性四类证据中整理评分依据
  - step: 4
    name: 应用规则集
    description: 依次检查 must_rules、forbidden_patterns、should_rules，并记录影响
  - step: 5
    name: 逐项评分
    description: 为每个二级指标输出 score、confidence、rationale、evidence、review_required
  - step: 6
    name: 计算总分
    description: 聚合维度得分并应用硬门槛总分上限
  - step: 7
    name: 提炼结论
    description: 输出优势项、问题项、风险项、总体建议
  - step: 8
    name: 生成人工复核清单
    description: 汇总 low confidence、临界分、硬门槛与证据不足项

current_limitations:
  - 当前版本未接入构建检查，无法将编译通过率纳入客观评分链路
  - 当前版本不评估功能正确性，仅评估代码产物质量
  - 人工复核阈值后续可结合真实数据进一步量化
