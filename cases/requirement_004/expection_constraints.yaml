constraints:
  - id: HM-REQ-008-01
    name: 必须使用 LoginWithHuaweiIDButton 实现华为账号一键登录
    description: 登录页必须使用 Account Kit 提供的 LoginWithHuaweiIDButton 组件作为一键登录入口，通过 loginComponentManager 管理登录流程，禁止自行封装普通 Button 模拟登录。
    priority: P0
    rules:
      - target: '**/pages/*.ets'
        ast:
          - type: import
            module: '@kit.AccountKit'
          - type: call
            name: LoginWithHuaweiIDButton
        llm: 检查是否从 @kit.AccountKit 导入并使用了 LoginWithHuaweiIDButton 组件
  - id: HM-REQ-008-02
    name: 登录成功后主页需展示用户头像和昵称
    description: 登录成功后跳转到主页，主页顶部需展示通过 Account Kit 获取的用户头像和昵称信息，不能使用硬编码的占位数据。
    priority: P0
    rules:
      - target: '**/pages/*.ets'
        ast:
          - type: call
            name: Image
          - type: call
            name: Text
        llm: 检查主页是否展示了从 Account Kit 获取的头像（Image组件）和昵称（Text组件），且数据来源于登录回调结果而非硬编码
  - id: HM-REQ-008-03
    name: 页面路由必须使用 Navigation + NavPathStack
    description: 登录页到主页的跳转必须使用 Navigation 和 NavPathStack 管理，禁止使用旧版 @ohos.router 或 router 模块。
    priority: P0
    rules:
      - target: '**/pages/*.ets'
        ast:
          - type: call
            name: Navigation
          - type: call
            name: NavPathStack
        llm: 检查是否使用 Navigation 和 NavPathStack 进行页面路由管理，不能出现 import router
  - id: HM-REQ-008-04
    name: 状态管理必须统一使用 V2 装饰器体系
    description: 所有组件必须使用 @ComponentV2，状态使用 @Local、@Param 等 V2 装饰器管理，禁止出现 @State、@Link、@Prop、@ObjectLink 等旧版装饰器。
    priority: P1
    rules:
      - target: '**/pages/*.ets'
        ast:
          - type: decorator
            name: ComponentV2
        llm: 检查所有组件是否使用 @ComponentV2，不能出现 @State、@Link、@Prop、@ObjectLink 等旧版装饰器
  - id: HM-REQ-008-05
    name: 主页需提供退出登录并返回登录页的能力
    description: 主页需有退出登录入口，点击后清除登录状态并通过 NavPathStack 返回登录页。
    priority: P1
    rules:
      - target: '**/pages/*.ets'
        ast:
          - type: call
            name: Button
        llm: 检查主页是否有退出登录按钮，点击后是否能清除状态并返回登录页
  - id: HM-REQ-008-06
    name: module.json5 需配置 Client ID
    description: 华为账号一键登录需要在 module.json5 中通过 metadata 配置 Client ID（可使用占位值），否则运行时无法拉起登录授权。
    priority: P1
    rules:
      - target: '**/module.json5'
        ast:
          - type: json_key
            name: metadata
        llm: 检查 module.json5 是否配置了 Client ID 相关的 metadata